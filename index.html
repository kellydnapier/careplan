<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Care Plan Builder</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a365d">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f0f2f5}
#app{display:flex;flex-direction:column;height:100vh}
.tab-bar{display:flex;background:#1a365d;flex-shrink:0;overflow-x:auto}
.tab-bar::-webkit-scrollbar{height:3px}
.tab-bar::-webkit-scrollbar-thumb{background:#63b3ed}
.tab-btn{padding:10px 15px;border:none;border-bottom:3px solid transparent;background:transparent;color:#a0b4d0;font-weight:500;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s;letter-spacing:.3px}
.tab-btn:hover{color:#cbd5e0}
.tab-btn.active{border-bottom-color:#63b3ed;background:#2a4a7f;color:#fff;font-weight:700}
.tab-btn.editor-tab{margin-left:auto;color:#fbd38d}
.tab-btn.editor-tab.active{background:#744210;border-bottom-color:#fbd38d;color:#fff}
.main{display:flex;gap:8px;padding:8px;flex:1;overflow:hidden}
.panel-left{width:33.33%;display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex-shrink:0}
.panel-left::-webkit-scrollbar{width:4px}
.panel-left::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:4px}
.panel-right-area{width:66.66%;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.panel-right-area::-webkit-scrollbar{width:4px}
.panel-right-area::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:4px}
.int-row{display:flex;gap:8px;align-items:flex-start;flex-shrink:0}
.int-col{width:50%}
.card{background:#fff;border-radius:6px;border:1px solid #d1d5db;padding:10px;display:flex;flex-direction:column;flex-shrink:0}
.card-label{font-weight:700;font-size:12px;color:#1a365d;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;line-height:1.3;flex-shrink:0}
.card-body{font-size:13px;color:#2d3748;line-height:1.5;white-space:pre-wrap}
.notes-body{font-size:12px;color:#374151;line-height:1.5;white-space:pre-wrap;overflow-y:auto;max-height:calc(33vh - 36px)}
.notes-body::-webkit-scrollbar{width:4px}
.notes-body::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:4px}
.notes-card{max-height:33vh}
.cond-list{overflow-y:auto;flex:1}
.cond-list::-webkit-scrollbar{width:4px}
.cond-list::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:4px}
.cond-item{display:flex;align-items:flex-start;gap:6px;padding:3px 0;cursor:pointer;font-size:13px;color:#2d3748;line-height:1.3}
.cond-item input[type="checkbox"]{margin-top:2px;accent-color:#2a4a7f}
.cond-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cond-title{font-weight:700;font-size:13px;color:#1a365d;text-transform:uppercase;letter-spacing:.5px}
.clear-btn{font-size:11px;color:#e53e3e;background:none;border:1px solid #e53e3e;border-radius:4px;padding:2px 8px;cursor:pointer}
.clear-btn:hover{background:#fff5f5}
.cp-select{width:100%;padding:6px 8px;border-radius:4px;border:1px solid #cbd5e0;font-size:13px;color:#2d3748;background:#fff}
.cp-select:disabled{background:#edf2f7}
.placeholder{flex:1;display:flex;align-items:center;justify-content:center;color:#718096;font-size:15px;font-style:italic}
.loading{flex:1;display:flex;align-items:center;justify-content:center;color:#4a5568;font-size:15px}
.editor-wrap{flex:1;overflow-y:auto;padding:12px;display:flex;gap:12px}
.editor-wrap::-webkit-scrollbar{width:4px}
.editor-wrap::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:4px}
.editor-sidebar{width:290px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.editor-main{flex:1;display:flex;flex-direction:column;gap:10px;overflow-y:auto;padding-right:4px}
.editor-main::-webkit-scrollbar{width:4px}
.editor-main::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:4px}
.ed-card{background:#fff;border-radius:6px;border:1px solid #d1d5db;padding:12px}
.ed-label{font-weight:600;font-size:12px;color:#1a365d;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;display:block}
.ed-select{width:100%;padding:7px 8px;border-radius:4px;border:1px solid #cbd5e0;font-size:13px;background:#fff;color:#2d3748}
.ed-input{width:100%;padding:7px 8px;border-radius:4px;border:1px solid #cbd5e0;font-size:13px;color:#2d3748}
.ed-textarea{width:100%;padding:8px;border-radius:4px;border:1px solid #cbd5e0;font-size:12px;color:#2d3748;line-height:1.5;resize:vertical;font-family:inherit;min-height:100px}
.ed-textarea.tall{min-height:160px}
.ed-cond-list{list-style:none;max-height:250px;overflow-y:auto}
.ed-cond-list::-webkit-scrollbar{width:4px}
.ed-cond-list::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:4px}
.ed-cond-item{display:flex;align-items:center;justify-content:space-between;padding:5px 6px;border-radius:4px;font-size:13px;color:#2d3748;cursor:pointer;gap:6px}
.ed-cond-item:hover{background:#edf2f7}
.ed-cond-item.active{background:#ebf4ff;color:#1a365d;font-weight:600}
.ed-cond-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ed-btn{padding:6px 14px;border-radius:4px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.3px}
.ed-btn-primary{background:#2a4a7f;color:#fff}
.ed-btn-primary:hover{background:#1a365d}
.ed-btn-success{background:#276749;color:#fff}
.ed-btn-success:hover{background:#22543d}
.ed-btn-danger{background:#e53e3e;color:#fff;padding:3px 8px;font-size:11px}
.ed-btn-danger:hover{background:#c53030}
.ed-btn-outline{background:none;border:1px solid #cbd5e0;color:#4a5568}
.ed-btn-outline:hover{background:#f7fafc}
.ed-btn-export{background:#744210;color:#fff;padding:10px 20px;font-size:14px}
.ed-btn-export:hover{background:#5a3510}
.ed-actions{display:flex;gap:6px;flex-wrap:wrap}
.ed-field{margin-bottom:10px}
.ed-field:last-child{margin-bottom:0}
.ed-hint{font-size:11px;color:#718096;margin-top:3px}
.ed-section-title{font-weight:700;font-size:14px;color:#1a365d;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #e2e8f0}
.ed-divider{height:1px;background:#e2e8f0;margin:6px 0}
.ed-badge{display:inline-block;background:#edf2f7;color:#4a5568;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600}
.ed-unsaved{display:inline-block;background:#fefcbf;color:#744210;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}
.ed-toast{position:fixed;bottom:20px;right:20px;background:#276749;color:#fff;padding:10px 20px;border-radius:6px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.ed-toast.show{opacity:1}
.ed-mode-btn{padding:8px 12px;border:1px solid #d1d5db;background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:#4a5568;transition:all .15s;flex:1;text-align:center}
.ed-mode-btn:first-child{border-radius:4px 0 0 4px}
.ed-mode-btn:last-child{border-radius:0 4px 4px 0}
.ed-mode-btn.active{background:#2a4a7f;color:#fff;border-color:#2a4a7f}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:8px;padding:20px;max-width:400px;width:90%}
.modal h3{margin-bottom:12px;color:#1a365d}
.modal p{font-size:13px;color:#4a5568;margin-bottom:16px;line-height:1.5}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
</style>
</head>
<body>
<div id="app"><div class="loading">Loading care plan data...</div></div>
<div id="toast" class="ed-toast"></div>
<div id="modal-root"></div>
<script>
let D=null,OD=null;
let S={activeTab:"Cardiac",sel:{},cp:{}};
let ED={mode:"conditions",system:"Cardiac",condition:null,cpTemplate:null,cpSystem:null,dirty:false};

fetch('data.json').then(r=>{if(!r.ok)throw new Error('Failed');return r.json()}).then(d=>{D=d;OD=JSON.stringify(d);render()}).catch(e=>{
  document.getElementById('app').innerHTML='<div class="loading" style="color:#e53e3e">Error loading data.json: '+e.message+'</div>';
});

// === UTILS ===
function E(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escQ(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500)}
function showModal(t,m,fn){const r=document.getElementById('modal-root');r.innerHTML='<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><h3>'+E(t)+'</h3><p>'+E(m)+'</p><div class="modal-actions"><button class="ed-btn ed-btn-outline" onclick="closeModal()">Cancel</button><button class="ed-btn ed-btn-danger" id="mc" style="padding:6px 14px;font-size:12px">Confirm</button></div></div></div>';document.getElementById('mc').onclick=fn}
function closeModal(){document.getElementById('modal-root').innerHTML=''}

// === CARE PLAN VIEW LOGIC ===
function gSel(){return S.sel[S.activeTab]||[]}
function gCP(){return S.cp[S.activeTab]||""}
function setTab(t){S.activeTab=t;render()}
function setCP(v){S.cp[S.activeTab]=v;S.sel[S.activeTab]=[];render()}
function toggleCond(c){const cur=gSel();S.sel[S.activeTab]=cur.includes(c)?cur.filter(x=>x!==c):[...cur,c];render()}
function clearAll(){S.sel[S.activeTab]=[];render()}

function condStr(){
  const s=[...gSel()].sort().map(c=>c.toLowerCase());
  if(!s.length)return"";if(s.length===1)return s[0];if(s.length===2)return s[0]+" and "+s[1];
  return s.slice(0,-1).join(", ")+", and "+s[s.length-1];
}
function repl(t){const c=condStr();if(!c)return t;return t.replace(/\(chronic illness\/es\)/gi,c).replace(/\(chronic illnes\/es\)/gi,c)}

function getTemplate(cpName){return D.care_plan_templates[cpName]||null}

function activeInts(tpl,sel,tab){
  if(!tpl)return[];
  const result=[];
  tpl.interventions.forEach((int,i)=>{
    if(int.skip_if_empty&&tpl.type==="condition_based"){
      const f=int.notes_field;
      const has=sel.some(c=>{const cn=D.condition_data[c];return cn&&cn[f]&&cn[f].trim().length>0});
      if(!has)return;
    }
    result.push(i);
  });
  return result;
}

function getNotes(tpl,intIdx,sel,tab,cpName){
  const int=tpl.interventions[intIdx];if(!int)return"";
  if(tpl.type==="condition_based"){
    if(int.notes_source==="body_system"){
      return D.emergency_notes[tab]||"";
    }
    const f=int.notes_field;const seen=new Set();const parts=[];
    for(const c of sel){
      const cn=D.condition_data[c];if(!cn)continue;
      const ct=(cn[f]||"").trim();
      if(ct&&!seen.has(ct)){seen.add(ct);parts.push(ct)}
    }
    return parts.join("\n\n\n");
  } else {
    const sp=D.system_care_plans[tab];
    if(!sp||!sp[cpName]||!sp[cpName].notes)return"";
    return sp[cpName].notes[intIdx]||"";
  }
}

// === EDITOR LOGIC ===
function edMode(m){ED.mode=m;ED.condition=null;ED.cpTemplate=null;ED.cpSystem=null;render()}
function edSetSystem(v){ED.system=v;ED.condition=null;ED.cpTemplate=null;ED.cpSystem=null;render()}
function edSelectCond(c){ED.condition=c;render()}

function edSaveCond(){
  const c=ED.condition;if(!c)return;
  D.condition_data[c]={
    education:document.getElementById('ed-education').value,
    diet:document.getElementById('ed-diet').value,
    online:document.getElementById('ed-online').value,
    community:document.getElementById('ed-community').value
  };ED.dirty=true;toast('Saved: '+c);render();
}
function edSaveEmergency(){
  D.emergency_notes[ED.system]=document.getElementById('ed-emergency').value;
  ED.dirty=true;toast('Saved emergency notes for '+ED.system);render();
}
function edAddCondition(){
  const n=document.getElementById('ed-new-name').value.trim();
  if(!n){toast('Enter a condition name');return}
  if(D.condition_data[n]){toast('Condition already exists');return}
  D.condition_data[n]={education:"",diet:"",online:"",community:""};
  if(!D.conditions[ED.system])D.conditions[ED.system]=[];
  D.conditions[ED.system].push(n);D.conditions[ED.system].sort();
  ED.condition=n;ED.dirty=true;toast('Added: '+n);render();
}
function edDeleteCond(c){
  showModal('Delete Condition','Delete "'+c+'"? This cannot be undone until you reload without exporting.',function(){
    delete D.condition_data[c];
    for(const sys of Object.keys(D.conditions)){D.conditions[sys]=(D.conditions[sys]||[]).filter(x=>x!==c)}
    if(S.sel){for(const sys of Object.keys(S.sel)){S.sel[sys]=(S.sel[sys]||[]).filter(x=>x!==c)}}
    if(ED.condition===c)ED.condition=null;
    ED.dirty=true;closeModal();toast('Deleted: '+c);render();
  });
}
function edRenameCond(){
  const o=ED.condition;if(!o)return;
  const n=document.getElementById('ed-rename').value.trim();
  if(!n||n===o)return;if(D.condition_data[n]){toast('Name already exists');return}
  D.condition_data[n]=D.condition_data[o];delete D.condition_data[o];
  for(const sys of Object.keys(D.conditions)){D.conditions[sys]=(D.conditions[sys]||[]).map(x=>x===o?n:x);D.conditions[sys].sort()}
  ED.condition=n;ED.dirty=true;toast('Renamed to: '+n);render();
}
function edMoveCond(ns){
  const c=ED.condition;if(!c)return;
  for(const sys of Object.keys(D.conditions)){D.conditions[sys]=(D.conditions[sys]||[]).filter(x=>x!==c)}
  if(!D.conditions[ns])D.conditions[ns]=[];
  D.conditions[ns].push(c);D.conditions[ns].sort();
  ED.system=ns;ED.dirty=true;toast('Moved '+c+' to '+ns);render();
}

// Body System Management
function edAddSystem(){
  const n=document.getElementById('ed-new-sys').value.trim();
  if(!n){toast('Enter a name');return}
  if(D.body_systems.includes(n)){toast('Already exists');return}
  D.body_systems.push(n);D.conditions[n]=[];D.system_care_plans[n]={};
  ED.dirty=true;toast('Added: '+n);render();
}
function edRenameSystem(){
  const o=ED.system,n=document.getElementById('ed-rename-sys').value.trim();
  if(!n||n===o)return;if(D.body_systems.includes(n)){toast('Name already exists');return}
  const idx=D.body_systems.indexOf(o);if(idx>=0)D.body_systems[idx]=n;
  D.conditions[n]=D.conditions[o]||[];delete D.conditions[o];
  D.system_care_plans[n]=D.system_care_plans[o]||{};delete D.system_care_plans[o];
  if(D.emergency_notes[o]){D.emergency_notes[n]=D.emergency_notes[o];delete D.emergency_notes[o]}
  ED.system=n;ED.dirty=true;toast('Renamed to: '+n);render();
}
function edDeleteSystem(){
  const s=ED.system;
  const conds=D.conditions[s]||[];
  if(conds.length>0){toast('Remove or move all conditions first');return}
  showModal('Delete Body System','Delete "'+s+'"?',function(){
    D.body_systems=D.body_systems.filter(x=>x!==s);
    delete D.conditions[s];delete D.system_care_plans[s];delete D.emergency_notes[s];
    ED.system=D.body_systems[0]||"";ED.dirty=true;closeModal();toast('Deleted: '+s);render();
  });
}

// Care Plan Template Management
function edSelectTemplate(n){ED.cpTemplate=n;ED.cpSystem=null;render()}
function edSelectCPSystem(s){ED.cpSystem=s;render()}

function edCreateTemplate(){
  const n=document.getElementById('ed-new-cp-name').value.trim();
  if(!n){toast('Enter a name');return}
  if(D.care_plan_templates[n]){toast('Already exists');return}
  D.care_plan_templates[n]={
    type:"system_based",problem:"",goal:"",
    interventions:[{label:"",text:""},{label:"",text:""},{label:"",text:""}]
  };
  ED.cpTemplate=n;ED.dirty=true;toast('Created: '+n);render();
}
function edCreateFromTemplate(){
  const src=document.getElementById('ed-cp-from').value;
  const n=document.getElementById('ed-new-cp-name').value.trim();
  if(!n){toast('Enter a name');return}
  if(D.care_plan_templates[n]){toast('Already exists');return}
  if(!src){toast('Select a template');return}
  const orig=D.care_plan_templates[src];
  D.care_plan_templates[n]=JSON.parse(JSON.stringify(orig));
  D.care_plan_templates[n].type="system_based";
  ED.cpTemplate=n;ED.dirty=true;toast('Created: '+n+' from '+src);render();
}
function edDeleteTemplate(n){
  if(n==="Knowledge Deficit"){toast('Cannot delete Knowledge Deficit');return}
  showModal('Delete Care Plan','Delete "'+n+'" template and remove from all body systems?',function(){
    delete D.care_plan_templates[n];
    for(const sys of Object.keys(D.system_care_plans)){delete D.system_care_plans[sys][n]}
    if(ED.cpTemplate===n)ED.cpTemplate=null;
    ED.dirty=true;closeModal();toast('Deleted: '+n);render();
  });
}
function edSaveTemplate(){
  const n=ED.cpTemplate;if(!n)return;
  const tpl=D.care_plan_templates[n];if(!tpl)return;
  tpl.problem=document.getElementById('ed-cp-problem').value;
  tpl.goal=document.getElementById('ed-cp-goal').value;
  // Save intervention labels and texts
  tpl.interventions.forEach((int,i)=>{
    const lbl=document.getElementById('ed-cp-int-label-'+i);
    const txt=document.getElementById('ed-cp-int-text-'+i);
    if(lbl)int.label=lbl.value;
    if(txt)int.text=txt.value;
  });
  ED.dirty=true;toast('Saved template: '+n);render();
}
function edAddIntervention(){
  const n=ED.cpTemplate;if(!n)return;
  const tpl=D.care_plan_templates[n];
  if(tpl.interventions.length>=10){toast('Maximum 10 interventions');return}
  tpl.interventions.push({label:"",text:""});
  ED.dirty=true;render();
}
function edRemoveIntervention(idx){
  const n=ED.cpTemplate;if(!n)return;
  const tpl=D.care_plan_templates[n];
  if(tpl.interventions.length<=3){toast('Minimum 3 interventions');return}
  tpl.interventions.splice(idx,1);
  // Also remove notes at this index from all systems
  for(const sys of Object.keys(D.system_care_plans)){
    const sp=D.system_care_plans[sys][n];
    if(sp&&sp.notes){
      const newNotes={};
      Object.keys(sp.notes).forEach(k=>{
        const ki=parseInt(k);
        if(ki<idx)newNotes[ki]=sp.notes[ki];
        else if(ki>idx)newNotes[ki-1]=sp.notes[ki];
      });
      sp.notes=newNotes;
    }
  }
  ED.dirty=true;render();
}
function edToggleSystemCP(sys,cpName){
  if(!D.system_care_plans[sys])D.system_care_plans[sys]={};
  if(D.system_care_plans[sys][cpName]){
    delete D.system_care_plans[sys][cpName];
  }else{
    D.system_care_plans[sys][cpName]={notes:{}};
  }
  ED.dirty=true;render();
}
function edSaveSystemNotes(){
  const cpName=ED.cpTemplate,sys=ED.cpSystem;
  if(!cpName||!sys)return;
  if(!D.system_care_plans[sys])D.system_care_plans[sys]={};
  if(!D.system_care_plans[sys][cpName])D.system_care_plans[sys][cpName]={notes:{}};
  const tpl=D.care_plan_templates[cpName];
  const notes={};
  tpl.interventions.forEach((int,i)=>{
    const el=document.getElementById('ed-cp-sys-note-'+i);
    if(el)notes[i]=el.value;
  });
  D.system_care_plans[sys][cpName].notes=notes;
  ED.dirty=true;toast('Saved notes for '+cpName+' in '+sys);render();
}

// Export/Revert
function edExport(){
  const j=JSON.stringify(D,null,2);
  const b=new Blob([j],{type:'application/json'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');
  a.href=u;a.download='data.json';a.click();URL.revokeObjectURL(u);
  ED.dirty=false;toast('data.json downloaded');render();
}
function edRevert(){
  showModal('Revert All Changes','Undo all changes and reload original data?',function(){
    D=JSON.parse(OD);ED.condition=null;ED.cpTemplate=null;ED.cpSystem=null;ED.dirty=false;
    closeModal();toast('Reverted');render();
  });
}

// === RENDER ===
function render(){
  if(!D)return;
  const tab=S.activeTab,isEditor=tab==='__editor__';
  let h='<div class="tab-bar">';
  for(const t of D.body_systems){
    h+='<button class="tab-btn'+(t===tab?' active':'')+'" onclick="setTab(\''+escQ(t)+'\')">'+E(t)+'</button>';
  }
  h+='<button class="tab-btn editor-tab'+(isEditor?' active':'')+'" onclick="setTab(\'__editor__\')">\u270E Data Editor'+(ED.dirty?' \u2022':'')+'</button></div>';
  if(isEditor)h+=renderEditor();
  else h+=renderCarePlan();
  document.getElementById('app').innerHTML=h;
}

function renderCarePlan(){
  const tab=S.activeTab,cp=gCP(),sel=gSel();
  const scp=D.system_care_plans[tab]||{};
  const cpNames=Object.keys(scp);
  if(cpNames.length===0)return'<div class="placeholder">No care plans assigned to '+E(tab)+'. Use the Data Editor to add care plans.</div>';
  const tpl=cp?getTemplate(cp):null;
  const isCondBased=tpl&&tpl.type==="condition_based";
  const hasContent=tpl&&(isCondBased?sel.length>0:true);
  const ai=hasContent?activeInts(tpl,sel,tab):[];
  let h='<div class="main"><div class="panel-left">';

  // Care Plan dropdown FIRST
  h+='<div class="card"><div class="card-label">Care Plan</div>';
  h+='<select class="cp-select" onchange="setCP(this.value)">';
  h+='<option value=""'+(cp?'':' selected')+'>-- Select Care Plan --</option>';
  for(const n of cpNames){h+='<option value="'+E(n)+'"'+(cp===n?' selected':'')+'>'+E(n)+'</option>'}
  h+='</select></div>';

  // Conditions (only for condition-based)
  if(isCondBased){
    const conds=D.conditions[tab]||[];
    h+='<div class="card" style="max-height:220px">';
    h+='<div class="cond-header"><span class="cond-title">Conditions</span><button class="clear-btn" onclick="clearAll()">Clear All</button></div>';
    h+='<div class="cond-list">';
    for(const c of conds){
      const ck=sel.includes(c)?' checked':'';
      h+='<label class="cond-item"><input type="checkbox"'+ck+' onchange="toggleCond(\''+escQ(c)+'\')"><span>'+E(c)+'</span></label>';
    }
    h+='</div></div>';
  }

  // Problem
  h+='<div class="card"><div class="card-label">Problem</div>';
  h+='<div class="card-body">'+(hasContent?E(isCondBased?repl(tpl.problem):tpl.problem):'')+'</div></div>';

  // Goal
  h+='<div class="card"><div class="card-label">Goal</div>';
  h+='<div class="card-body">'+(hasContent?E(isCondBased?repl(tpl.goal):tpl.goal):'')+'</div></div>';

  h+='</div><div class="panel-right-area">';

  // Interventions & Notes
  const il=ai.length>0?ai:(tpl?tpl.interventions.map((_,i)=>i):[0,1,2,3,4]);
  for(const idx of il){
    const int=tpl?tpl.interventions[idx]:null;
    const lbl=int?(cp?'Intervention '+(idx+1)+' - '+int.label:'Intervention '+(idx+1)):'Intervention '+(idx+1);
    const intText=hasContent&&int?(isCondBased?repl(int.text):int.text):'';
    const notesText=hasContent?getNotes(tpl,idx,sel,tab,cp):'';
    h+='<div class="int-row"><div class="int-col"><div class="card"><div class="card-label">'+E(lbl)+'</div>';
    h+='<div class="card-body">'+E(intText)+'</div></div></div>';
    h+='<div class="int-col"><div class="card notes-card"><div class="card-label">Notes</div>';
    h+='<div class="notes-body">'+E(notesText)+'</div></div></div></div>';
  }
  h+='</div></div>';
  return h;
}

      h+='<button class="ed-btn ed-btn-danger" onclick="event.stopPropagation();edDeleteCond(\''+escQ(c)+'\')">Delete</button></li>';
    }
    h+='</ul><div class="ed-divider"></div>';
    h+='<div style="display:flex;gap:4px;margin-top:4px">';

      const isKD=n==='Knowledge Deficit';
      h+='<li class="ed-cond-item'+(n===ED.cpTemplate?' active':'')+'" onclick="edSelectTemplate(\''+escQ(n)+'\')">';
      h+='<span class="ed-cond-name">'+E(n)+'</span>';
      if(!isKD)h+='<button class="ed-btn ed-btn-danger" onclick="event.stopPropagation();edDeleteTemplate(\''+escQ(n)+'\')">Delete</button>';
      h+='</li>';
    }
    h+='</ul><div class="ed-divider"></div>';
    h+='<div class="ed-field"><input type="text" id="ed-new-cp-name" class="ed-input" placeholder="New care plan name"></div>';
    h+='<div style="display:flex;gap:4px">';
    h+='<button class="ed-btn ed-btn-primary" onclick="edCreateTemplate()" style="flex:1">Create Blank</button></div>';
    if(tplNames.length>0){

function renderEdCondMainContent(){
  const cond=ED.condition;
  const cd=cond?(D.condition_data[cond]||{education:"",diet:"",online:"",community:""}):null;
  const allSys=D.body_systems;
  let h='';
  if(cond&&cd){
    h+='<div class="ed-card"><div class="ed-section-title">'+E(cond)+'</div>';
    h+='<div class="ed-field"><label class="ed-label">Rename</label>';
    h+='<div style="display:flex;gap:4px"><input type="text" id="ed-rename" class="ed-input" value="'+E(cond)+'" style="flex:1">';
    h+='<button class="ed-btn ed-btn-outline" onclick="edRenameCond()">Rename</button></div></div>';
    h+='<div class="ed-field"><label class="ed-label">Move to</label>';
    h+='<div style="display:flex;gap:4px"><select id="ed-move-sys" class="ed-select" style="flex:1">';
    for(const s of allSys)h+='<option value="'+E(s)+'"'+(s===ED.system?' selected':'')+'>'+E(s)+'</option>';
    h+='</select><button class="ed-btn ed-btn-outline" onclick="edMoveCond(document.getElementById(\'ed-move-sys\').value)">Move</button></div></div></div>';

    h+='<div class="ed-card"><div class="ed-section-title">Content Fields</div>';
    h+='<div class="ed-field"><label class="ed-label">Education & Self Management</label>';
    h+='<textarea id="ed-education" class="ed-textarea tall">'+E(cd.education||'')+'</textarea>';
    h+='<div class="ed-hint">Knowledge Deficit → Intervention 1 notes</div></div>';
    h+='<div class="ed-field"><label class="ed-label">Dietary Education</label>';
    h+='<textarea id="ed-diet" class="ed-textarea tall">'+E(cd.diet||'')+'</textarea>';
    h+='<div class="ed-hint">Knowledge Deficit → Intervention 2 notes (leave empty to skip)</div></div>';
    h+='<div class="ed-field"><label class="ed-label">Educational Materials / Online Resources</label>';
    h+='<textarea id="ed-online" class="ed-textarea">'+E(cd.online||'')+'</textarea>';
    h+='<div class="ed-hint">Knowledge Deficit → Intervention 4 notes</div></div>';
    h+='<div class="ed-field"><label class="ed-label">Community Resources</label>';
    h+='<textarea id="ed-community" class="ed-textarea">'+E(cd.community||'')+'</textarea>';
    h+='<div class="ed-hint">Knowledge Deficit → Intervention 5 notes</div></div>';
    h+='<div class="ed-actions"><button class="ed-btn ed-btn-success" onclick="edSaveCond()">Save Condition</button></div></div>';
  } else {
    h+='<div class="ed-card" style="text-align:center;padding:40px;color:#718096">';
    h+='<div style="font-size:24px;margin-bottom:8px">\u2190</div>';
    h+='<div>Select a condition to edit or add a new one.</div></div>';
  }

  // Emergency notes
  h+='<div class="ed-card"><div class="ed-section-title">Emergency Notes \u2014 '+E(ED.system)+'</div>';
  h+='<div class="ed-hint" style="margin-bottom:8px">Shared across all conditions (Knowledge Deficit → Intervention 3).</div>';
  h+='<textarea id="ed-emergency" class="ed-textarea tall">'+E(D.emergency_notes[ED.system]||'')+'</textarea>';
  h+='<div class="ed-actions" style="margin-top:8px"><button class="ed-btn ed-btn-success" onclick="edSaveEmergency()">Save Emergency Notes</button></div></div>';
  return h;
}

function renderEdCPMainContent(){
  const cpName=ED.cpTemplate;
  if(!cpName){
    return '<div class="ed-card" style="text-align:center;padding:40px;color:#718096"><div style="font-size:24px;margin-bottom:8px">\u2190</div><div>Select a care plan template to edit, or create a new one.</div></div>';
  }
  const tpl=D.care_plan_templates[cpName];
  if(!tpl)return'';
  const isKD=cpName==='Knowledge Deficit';
  const isCondBased=tpl.type==='condition_based';
  let h='';

  // Template editing
  h+='<div class="ed-card"><div class="ed-section-title">'+E(cpName)+(isCondBased?' <span class="ed-badge">condition-based</span>':' <span class="ed-badge">system-based</span>')+'</div>';

  h+='<div class="ed-field"><label class="ed-label">Problem Statement</label>';
  h+='<textarea id="ed-cp-problem" class="ed-textarea">'+E(tpl.problem)+'</textarea>';
  if(isCondBased)h+='<div class="ed-hint">Use (chronic illness/es) as placeholder for condition names</div>';
  h+='</div>';

  h+='<div class="ed-field"><label class="ed-label">Goal</label>';
  h+='<textarea id="ed-cp-goal" class="ed-textarea">'+E(tpl.goal)+'</textarea></div>';

  h+='<div class="ed-divider"></div>';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  h+='<span class="ed-label" style="margin:0">Interventions ('+tpl.interventions.length+')</span>';
  if(!isKD&&tpl.interventions.length<10)h+='<button class="ed-btn ed-btn-primary" onclick="edAddIntervention()">+ Add</button>';
  h+='</div>';

  tpl.interventions.forEach((int,i)=>{
    h+='<div style="background:#f7fafc;border:1px solid #e2e8f0;border-radius:4px;padding:8px;margin-bottom:6px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
    h+='<span style="font-weight:700;font-size:11px;color:#4a5568">INTERVENTION '+(i+1)+'</span>';
    if(!isKD&&tpl.interventions.length>3)h+='<button class="ed-btn ed-btn-danger" onclick="edRemoveIntervention('+i+')">Remove</button>';
    h+='</div>';
    h+='<div class="ed-field"><label class="ed-label" style="font-size:11px">Label</label>';
    h+='<input type="text" id="ed-cp-int-label-'+i+'" class="ed-input" value="'+E(int.label)+'"'+(isKD?' readonly style="background:#edf2f7"':'')+'></div>';
    h+='<div class="ed-field"><label class="ed-label" style="font-size:11px">Text</label>';
    h+='<textarea id="ed-cp-int-text-'+i+'" class="ed-textarea" style="min-height:60px"'+(isKD?' readonly style="background:#edf2f7;min-height:60px"':'')+'>'+E(int.text)+'</textarea></div>';
    h+='</div>';
  });

  h+='<div class="ed-actions" style="margin-top:6px"><button class="ed-btn ed-btn-success" onclick="edSaveTemplate()">Save Template</button></div></div>';

  // Body system assignment (not for KD since it's always available)
  if(!isCondBased){
    h+='<div class="ed-card"><div class="ed-section-title">Assign to Body Systems</div>';
    h+='<div class="ed-hint" style="margin-bottom:8px">Check which body systems this care plan is available for.</div>';
    for(const sys of D.body_systems){
      const has=D.system_care_plans[sys]&&D.system_care_plans[sys][cpName];
      h+='<label class="cond-item" style="padding:4px 0"><input type="checkbox"'+(has?' checked':'')+' onchange="edToggleSystemCP(\''+escQ(sys)+'\',\''+escQ(cpName)+'\')">';
      h+='<span>'+E(sys)+'</span></label>';
    }
    h+='</div>';

    // Per-system notes editing
    h+='<div class="ed-card"><div class="ed-section-title">Notes by Body System</div>';
    h+='<div class="ed-hint" style="margin-bottom:8px">Select an assigned body system to fill in intervention notes.</div>';
    const assigned=D.body_systems.filter(s=>D.system_care_plans[s]&&D.system_care_plans[s][cpName]);
    if(assigned.length>0){
      h+='<div class="ed-field"><select class="ed-select" onchange="edSelectCPSystem(this.value)">';
      h+='<option value="">-- Select Body System --</option>';
      for(const s of assigned)h+='<option value="'+E(s)+'"'+(s===ED.cpSystem?' selected':'')+'>'+E(s)+'</option>';
      h+='</select></div>';

      if(ED.cpSystem&&assigned.includes(ED.cpSystem)){
        const sysNotes=(D.system_care_plans[ED.cpSystem]&&D.system_care_plans[ED.cpSystem][cpName]&&D.system_care_plans[ED.cpSystem][cpName].notes)||{};
        tpl.interventions.forEach((int,i)=>{
          h+='<div class="ed-field"><label class="ed-label" style="font-size:11px">Intervention '+(i+1)+' - '+E(int.label)+' Notes</label>';
          h+='<textarea id="ed-cp-sys-note-'+i+'" class="ed-textarea">'+E(sysNotes[i]||'')+'</textarea></div>';
        });
        h+='<div class="ed-actions"><button class="ed-btn ed-btn-success" onclick="edSaveSystemNotes()">Save Notes for '+E(ED.cpSystem)+'</button></div>';
      }
    } else {
      h+='<div style="color:#718096;font-size:13px;font-style:italic">No body systems assigned yet.</div>';
    }
    h+='</div>';
  }

  return h;
}

function renderEdSystemsMainContent(){
  const sys=ED.system;
  const conds=D.conditions[sys]||[];
  const plans=Object.keys(D.system_care_plans[sys]||{});
  let h='<div class="ed-card"><div class="ed-section-title">'+E(sys)+'</div>';
  h+='<div class="ed-field"><label class="ed-label">Rename Body System</label>';
  h+='<div style="display:flex;gap:4px"><input type="text" id="ed-rename-sys" class="ed-input" value="'+E(sys)+'" style="flex:1">';
  h+='<button class="ed-btn ed-btn-outline" onclick="edRenameSystem()">Rename</button></div></div>';

  h+='<div style="margin-top:8px"><span class="ed-label">Status</span>';
  h+='<div style="font-size:13px;color:#4a5568;margin-bottom:4px">Conditions: '+conds.length+'</div>';
  h+='<div style="font-size:13px;color:#4a5568;margin-bottom:8px">Care Plans: '+plans.join(', ')+'</div>';

  if(conds.length===0){
    h+='<button class="ed-btn ed-btn-danger" style="padding:6px 14px;font-size:12px" onclick="edDeleteSystem()">Delete Body System</button>';
  } else {
    h+='<div class="ed-hint">Remove or move all conditions before deleting this body system.</div>';
  }
  h+='</div></div>';
  return h;
}
