const EMERGENCY_NOTES={"Cardiac": "When to get emergency help:\n\n-Hypertensive crisis (eg, blood pressure of 180/120 mm Hg or higher; severe headache; motor or sensory deficits; somnolence; seizure; unexplained chest, abdominal, or back pain)\n\n-Heart attack (eg, persistent chest pain; pain radiating to the arms, shoulders, neck, back, and/or jaw; cool clammy skin)\n\n-Stroke (eg, face drooping, arm weakness, speech problems, bad headache, vision changes, loss of balance or coordination)\n\n-Chest pain (angina) not relieved with rest and systematic nitroglycerin use\n\n-Oxygenation inadequate (eg, cyanosis, severe dyspnea)\n\n\nWhen to call the provider:\n\n-Blood pressure outside of provider's parameters\n\n-Medication problems (eg, side effects, access, administration)\n\n-Medications newly ordered from other providers\n\n-Comorbid condition exacerbation", "Pulmonary": "When to get emergency help:\n\n-Heart attack (eg, persistent chest pain; pain radiating to the arms, shoulders, neck, back, and/or jaw; cool clammy skin)\n\n-Stroke (eg, face drooping, arm weakness, speech problems, bad headache, vision changes, loss of balance or coordination)\n\n-Exacerbation (eg, cannot say a full sentence in one breath, sudden wheezing, severe or painful dyspnea, choking)\n\n-Oxygenation inadequate (eg, cyanosis, severe dyspnea)\n\n-Oxygen toxicity (eg, chest pain, dyspnea, restlessness)\n\n-Heartbeat irregular, new\n\n-Consciousness level change, abrupt\n\n-Headache (eg, sudden severe, unrelieved by analgesics)", "Endocrine": "When to get emergency help:\n\nHeart attack (eg, persistent chest pain; pain radiating to the arms, shoulders, neck, back, and/or jaw; cool clammy skin)\n\nStroke (eg, face drooping, arm weakness, speech problems, bad headache, vision changes, loss of balance or coordination)\n\nHypoglycemia, severe (eg, walking difficulty or poor coordination, seizure, coma)\n\nHyperglycemia, severe (eg, diabetic ketoacidosis, coma)\n\nDiabetic ketoacidosis (DKA) (eg, loss of consciousness, mental status changes, vomiting, and deep labored breathing)\n\nOxygenation inadequate (eg, cyanosis, severe dyspnea)\n\nConsciousness level change, abrupt\n\nVision change, sudden\n\n\nWhen to call the provider:\n\nBlood glucose outside of provider's parameters\n\nHyperglycemia (eg, elevated blood glucose, nausea, frequent urination)\n\nHypoglycemia (eg, low blood glucose, confusion, thirst, headache, blurred vision)\n\nUrine ketones are moderate to high.\n\nMedical equipment problems or needs\n\nMedication problems (eg, side effects, access, administration)\n\nInfection (eg, low-grade fever, sore throat, nausea, vomiting, or diarrhea)\n\nGastrointestinal distress (eg, nausea, vomiting, diarrhea, cramping)\nSkin problems (eg, rash, nonhealing sore)\n\nDepression (eg, feeling sad, hopeless, overwhelmed)", "Renal": "When to call for emergency help\n -You think you are having a heart attack or stroke.\n -You think about hurting or killing yourself. \n-You think about what to do before you would kill yourself. \n\u2013You have a plan for how to kill yourself. \n\u2013You are trying activities where you can get hurt. \n-Your crisis plan is not working. \n-Your behavior has changed and is causing harm to yourself or others.\n -You think about hurting someone else. \n-You are very sleepy or find it hard to wake up. \n-You are told that you are seeing or hearing things that are not there. \n-Your family or friends notice that you are suddenly confused or not thinking clearly. \n-You have a seizure (body shaking, staring, eyes rolling).\n\nWhen to contact your provider\n-Your eating habits have changed, like eating too much or not enough.\n-You have problems with your thinking or your confusion gets worse.\n\u2013 You forget things easily, like where you put things.\n\u2013 You say things that do not make sense to other people.\n-You gain or lose weight and you do not know why.\n-You have loose stools (diarrhea) or hard stools (constipation) that do not go\naway.\n-You have problems with your medicine.\n\u2013 You skip or miss more than one dose a week.\n\u2013 You cannot remember if you took your medicine.\n\u2013 You stop taking your medicine.\n\u2013 You are using medicine more often than your doctor told you to.\n\u2013 You are getting medicine from more than one doctor.\n-You have side effects from your medicine that worry you.\n\u2013 You have tremors or you twitch.\n\u2013 You feel confused, dizzy, or sleepy.\n\u2013 Your heart is pounding in your chest.\n\u2013 You feel sick to your stomach (nausea) a lot.\n\u2013 You have a dry mouth all the time.\n\u2013 You have sexual problems.\n-You drink a lot of alcohol or use drugs.\n-You stop taking care of yourself, like bathing, brushing your teeth, or\ncombing your hair.\n-You are afraid to go out, let anyone visit, or answer the phone and door.\n-You avoid other people.\n-You stop going to your support group.\n-You have problems at work, like not completing tasks or not performing\nwell.\n-The signs of your illness come back.\n-You have trouble sleeping or you sleep too much.", "Neurological": "When to call for emergency help\n -You think you are having a heart attack or stroke.\n -You think about hurting or killing yourself. \n-You think about what to do before you would kill yourself. \n\u2013You have a plan for how to kill yourself. \n\u2013You are trying activities where you can get hurt. \n-Your crisis plan is not working. \n-Your behavior has changed and is causing harm to yourself or others.\n -You think about hurting someone else. \n-You are very sleepy or find it hard to wake up. \n-You are told that you are seeing or hearing things that are not there. \n-Your family or friends notice that you are suddenly confused or not thinking clearly. \n-You have a seizure (body shaking, staring, eyes rolling).\n\nWhen to contact your provider\n-Your eating habits have changed, like eating too much or not enough.\n-You have problems with your thinking or your You feel dizzy or light-headed.\n-You are depressed, sad, confused, or feel overwhelmed.\n-You have trouble sleeping or you want to sleep too much.\n-You need help with personal care or doing chores.\n-You have problems or need help with the medical equipment."};

const TABS=["Cardiac","Pulmonary","Endocrine","Renal","Neurological","Gastrointestinal","Musculoskeletal","Hematological","Pain Management","Care Coordination"];
const INT_LABELS={1:"Education and Self Management",2:"Dietary Education",3:"When to call 911 vs When to call Provider",4:"Educational Materials",5:"Community Resources"};
const INT_TEXT={
  1:"Case manager to provide education on (chronic illness/es), including pathophysiology, risk factors, self management, and expected outcomes.",
  2:"Case manager to educate member on proper diet and assist in dietary modifications to better manage chronic condition.",
  3:"Case manager to educate member/family/caregiver on the appropriate symptoms of chronic condition that require medical emergency treatment and when to contact MD.",
  4:"Provide or send educational resources, including online links, for disease education and management.",
  5:"Refer to Community Resources"
};
const PROBLEM_T="Knowledge deficit related to (chronic illness/es) self management.";
const GOAL_T="Member will verbalize understanding of (chronic illness/es) disease process, self management, and when to seek help.";

let S={activeTab:"Cardiac",sel:{},cp:{}};
function gSel(){return S.sel[S.activeTab]||[]}
function gCP(){return S.cp[S.activeTab]||""}

function toggleCond(c){
  const cur=gSel();
  S.sel[S.activeTab]=cur.includes(c)?cur.filter(x=>x!==c):[...cur,c];
  render();
}
function clearAll(){S.sel[S.activeTab]=[];S.cp[S.activeTab]="";render()}
function setCP(v){S.cp[S.activeTab]=v;render()}
function setTab(t){S.activeTab=t;render()}

function condStr(){
  const s=[...gSel()].sort().map(c=>c.toLowerCase());
  if(!s.length)return"";
  if(s.length===1)return s[0];
  if(s.length===2)return s[0]+" and "+s[1];
  return s.slice(0,-1).join(", ")+", and "+s[s.length-1];
}
function repl(t){
  const c=condStr();
  if(!c)return t;
  return t.replace(/\(chronic illness\/es\)/gi,c).replace(/\(chronic illnes\/es\)/gi,c);
}
function activeInts(){
  const sel=gSel(),cp=gCP();
  if(!cp||!sel.length)return[];
  const hasDiet=sel.some(c=>{const n=CONDITION_NOTES[c];return n&&n.diet&&n.diet.trim().length>0});
  return hasDiet?[1,2,3,4,5]:[1,3,4,5];
}
function getNotes(i){
  const sel=gSel();if(!sel.length)return"";
  const parts=[];
  for(const c of sel){
    const cn=CONDITION_NOTES[c];if(!cn)continue;
    if(i===3){const em=EMERGENCY_NOTES[S.activeTab]||"";if(parts.length===0&&em)parts.push(em);continue}
    let ct="";
    if(i===1)ct=cn.education||"";
    else if(i===2)ct=cn.diet||"";
    else if(i===4)ct=cn.online||"";
    else if(i===5)ct=cn.community||"";
    if(ct&&ct.trim())parts.push(ct.trim());
  }
  return parts.join("\n\n\n");
}
function E(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escQ(s){return s.replace(/'/g,"\\'")}

function render(){
  const tab=S.activeTab,sel=gSel(),cp=gCP();
  const isCareCoord=tab==="Care Coordination";
  const conds=BODY_SYSTEMS[tab]||[];
  const ai=activeInts();
  const has=cp&&sel.length>0;
  let h='';

  h+='<div class="tab-bar">';
  for(const t of TABS){
    h+='<button class="tab-btn'+(t===tab?' active':'')+'" onclick="setTab(\''+escQ(t)+'\')">'+E(t)+'</button>';
  }
  h+='</div>';

  if(isCareCoord){
    h+='<div class="placeholder">Care Coordination — Coming in a future version</div>';
  }else{
    h+='<div class="main">';

    // LEFT PANEL
    h+='<div class="panel-left">';

    h+='<div class="card" style="max-height:260px">';
    h+='<div class="cond-header"><span class="cond-title">Conditions</span><button class="clear-btn" onclick="clearAll()">Clear All</button></div>';
    h+='<div class="cond-list">';
    for(const c of conds){
      const ck=sel.includes(c)?' checked':'';
      h+='<label class="cond-item"><input type="checkbox"'+ck+' onchange="toggleCond(\''+escQ(c)+'\')"><span>'+E(c)+'</span></label>';
    }
    h+='</div></div>';

    h+='<div class="card"><div class="card-label">Care Plan</div>';
    h+='<select class="cp-select" onchange="setCP(this.value)"'+(sel.length===0?' disabled':'')+'>';
    h+='<option value=""'+(cp?'':' selected')+'>-- Select Care Plan --</option>';
    h+='<option value="Knowledge Deficit"'+(cp==='Knowledge Deficit'?' selected':'')+'>Knowledge Deficit</option>';
    h+='</select></div>';

    h+='<div class="card"><div class="card-label">Problem</div>';
    h+='<div class="card-body">'+(has?E(repl(PROBLEM_T)):'')+'</div></div>';

    h+='<div class="card"><div class="card-label">Goal</div>';
    h+='<div class="card-body">'+(has?E(repl(GOAL_T)):'')+'</div></div>';

    h+='</div>';

    // RIGHT AREA - Intervention + Notes rows
    h+='<div class="panel-right-area">';
    const il=ai.length>0?ai:[1,2,3,4,5];
    for(const i of il){
      const lbl=cp?'Intervention '+i+' - '+INT_LABELS[i]:'Intervention '+i;
      h+='<div class="int-row">';
      // Intervention card - auto height
      h+='<div class="int-col"><div class="card"><div class="card-label">'+E(lbl)+'</div>';
      h+='<div class="card-body">'+(has?E(repl(INT_TEXT[i])):'')+'</div></div></div>';
      // Notes card - fixed max-height 33vh with scroll
      h+='<div class="int-col"><div class="card notes-card"><div class="card-label">Notes</div>';
      h+='<div class="notes-body">'+(has?E(getNotes(i)):'')+'</div></div></div>';
      h+='</div>';
    }
    h+='</div>';

    h+='</div>';
  }
  document.getElementById('app').innerHTML=h;
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
render();
</script>
