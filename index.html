<head>

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f0f2f5}
  #app{display:flex;flex-direction:column;height:100vh}
  .tab-bar{display:flex;background:#1a365d;flex-shrink:0;overflow-x:auto}
  .tab-bar::-webkit-scrollbar{height:3px}
  .tab-bar::-webkit-scrollbar-thumb{background:#63b3ed}
  .tab-btn{padding:10px 15px;border:none;border-bottom:3px solid transparent;background:transparent;color:#a0b4d0;font-weight:500;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s;letter-spacing:.3px}
  .tab-btn:hover{color:#cbd5e0}
  .tab-btn.active{border-bottom-color:#63b3ed;background:#2a4a7f;color:#fff;font-weight:700}
  .main{display:flex;gap:8px;padding:8px;flex:1;overflow:hidden}
  .panel-left{width:33.33%;display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex-shrink:0}
  .panel-left::-webkit-scrollbar{width:4px}
  .panel-left::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:4px}
  .panel-right-area{width:66.66%;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
  .panel-right-area::-webkit-scrollbar{width:4px}
  .panel-right-area::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:4px}
  .int-row{display:flex;gap:8px;align-items:flex-start;flex-shrink:0}
  .int-col{width:50%}
  .card{background:#fff;border-radius:6px;border:1px solid #d1d5db;padding:10px;display:flex;flex-direction:column;flex-shrink:0}
  .card-label{font-weight:700;font-size:12px;color:#1a365d;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;line-height:1.3;flex-shrink:0}
  .card-body{font-size:13px;color:#2d3748;line-height:1.5;white-space:pre-wrap}
  .notes-body{font-size:12px;color:#374151;line-height:1.5;white-space:pre-wrap;overflow-y:auto;max-height:calc(33vh - 36px)}
  .notes-body::-webkit-scrollbar{width:4px}
  .notes-body::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:4px}
  .notes-card{max-height:33vh}
  .cond-list{overflow-y:auto;flex:1}
  .cond-list::-webkit-scrollbar{width:4px}
  .cond-list::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:4px}
  .cond-item{display:flex;align-items:flex-start;gap:6px;padding:3px 0;cursor:pointer;font-size:13px;color:#2d3748;line-height:1.3}
  .cond-item input{margin-top:2px;accent-color:#2a4a7f}
  .cond-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .cond-title{font-weight:700;font-size:13px;color:#1a365d;text-transform:uppercase;letter-spacing:.5px}
  .clear-btn{font-size:11px;color:#e53e3e;background:none;border:1px solid #e53e3e;border-radius:4px;padding:2px 8px;cursor:pointer}
  .clear-btn:hover{background:#fff5f5}
  .cp-select{width:100%;padding:6px 8px;border-radius:4px;border:1px solid #cbd5e0;font-size:13px;color:#2d3748;background:#fff}
  .cp-select:disabled{background:#edf2f7}
  .placeholder{flex:1;display:flex;align-items:center;justify-content:center;color:#718096;font-size:15px;font-style:italic}
</style>
</head>

<script>
const BODY_SYSTEMS={"Cardiac": ["Abdominal Aortic Aneurysm", "Atrial Fibrillation (AFib)", "Congestive Heart Failure", "Coronary Artery Disease", "Dyslipidemia", "Hypertension", "PAD", "PVD", "Sick Sinus Syndrome"], "Pulmonary": ["Asthma", "COPD", "Laryngeal Cancer", "OSA", "Pulmonary Fibrosis"], "Endocrine": ["Diabetes", "Hyperparathyroidism", "Hypothyroidism", "Weight Management"], "Renal": ["BPH", "CKD", "Hx of Renal Cancer", "Urinary Incontinence"], "Neurological": ["Alzheimer's", "Anxiety", "Bipolar Disorder", "CVA/Stroke", "Depression", "Hearing Issues", "PTSD"], "Gastrointestinal": ["Cirrhosis", "Crohn's Disease", "NASH"], "Musculoskeletal": ["Arthritis", "DDD", "Fall/Safety Precautions", "Osteoperosis"], "Hematological": ["Anemia", "Cancer", "Skin Cancer"], "Pain Management": ["Pain Management"], "Care Coordination": []};
const CONDITION_NOTES={"Abdominal Aortic Aneurysm": {"education": "An abdominal aortic aneurysm (AAA) is an enlargement or bulge in the part of your aorta that extends through your belly or abdomen (abdominal aorta).\n\nSigns and symptoms:\n\n-Steady, deep pain in your lower back or belly.\n-Pain in your leg, groin or pelvic area.\n-A pulsing sensation in your belly that feels like a heartbeat.\n\nA ruptured AAA is a medical emergency. Symptoms begin suddenly and can include:\n\n-Severe pain in your belly, lower back or legs.\n-Shortness of breath.\n-Fast heartbeat.\n-Low blood pressure.\n-Dizziness or fainting.\n-Nausea or vomiting.\n-Clammy, sweaty skin.\n\nTreatment:\n\n-Lifestyle changes (These include avoiding all tobacco use, eating a heart-healthy diet and exercising.)\n\n-Medications\n\n-Surgery\n\nReference:\nAbdominal Aortic Aneurysm: Causes, Symptoms and Treatment. (n.d.). Cleveland Clinic. https://my.clevelandclinic.org/health/diseases/7153-abdominal-aortic-aneurysm#management-and-treatment\n\n?", "diet": "Diet Tips for Heart Health: \n\n-Eat more fruits and vegetables every day, they help keep your \nheart strong.\n-Choose whole grains like brown rice, whole wheat bread, or \noatmeal instead of white bread or white rice.\n-Pick lean proteins such as chicken without skin, fish, beans, \nor tofu.\n-Limit salt by not adding extra at the table and avoiding processed or fast foods. Use herbs and spices for flavor instead.\n-Cut back on fatty foods like fried foods, butter, cheese, and fatty cuts of meat. Choose healthier fats like olive oil or avocado \nin small amounts.\n-Drink plenty of water and avoid sugary drinks.\n\n\nReference:\nAmerican Heart Association. (2023). Healthy eating for a healthy heart. https://www.heart.org/en/healthy-living/healthy-eating\n\nDASH diet:\n-Eat more of:\n-Fruits and vegetables\n-Whole grains (brown rice, oats, whole wheat bread)\n-Low-fat or fat-free dairy products\n-Lean meats, poultry, and fish\n-Nuts, seeds, and legumes (beans, lentils)\n-Limit or avoid:\n-Salt (sodium): aim for less than 2,300 mg/day or 1,500 mg if advised\n-Processed and packaged foods (chips, canned soup, deli meats)\n-Sugary drinks and sweets\n-Foods high in saturated fat (fried foods, fatty meats, full-fat dairy)\n-Alcohol (limit to 1 drink/day for women, 2 for men)\n-Read nutrition labels and choose \u201clow-sodium\u201d or \u201cno-salt-added\u201d products\n-Cook at home more often and avoid adding salt at the table\n-Use herbs, lemon, garlic, and spices for flavor instead of salt\n-Rinse canned vegetables and beans to remove extra sodium", "online": "", "community": ""}, "Alzheimer's": {"education": "Alzheimer's disease is the most common cause of dementia. Alzheimer's disease is the biological process that begins with the appearance of a buildup of proteins in the form of amyloid plaques and neurofibrillary tangles in the brain. This causes brain cells to\n die over time and the brain to shrink.\n\nSymptoms:\n-Repeat statements and questions over and over.\n-Forget conversations, appointments or events.\n-Misplace items, often putting them in places that don't \nmake sense.\n-Get lost in places they used to know well.\n-Forget the names of family members and everyday objects.\nHave trouble finding the right words, expressing thoughts or having conversations.\n\n-Changes in personality and behavior (Depression, social withdrawals, wandering, mood swings).\n\nRisk factors:\n-Older age\n-Family history and genetic\n-Mild cognitive impairment\n-Down syndrome\n-Sex assigned at birth\n-Head injury\n-Air pollution\n-Heavy alcohol use\n-Poor sleep patterns\n-Lifestyle and heart health\n\nTreatments:\n-Medicines (Cholinesterase inhibitor, Namenda)\n-Creating a safe and supportive environment\n-Creating routine habits and cut down on tasks that require memory\n(E.g. Make sure regular appointments are on the same day at the same time as much as possible, Use a calendar or whiteboard to trackdaily schedules. Build the habit of checking off completed \nitems.)\n\nReference: Mayo Clinic. (2024, July 10).", "diet": "", "online": "Alzheimer's Foundation of America\nhttps://alzfdn.org/\n\nAlzheimer's Association\nhttps://www.alz.org/", "community": "Alzheimer's Disease Association of Kern County - 661-665-8871\nhttps://www.adakc.org/\n\nKern County Aging and Adult Services - 661-868-3140\nhttps://www.kerncounty.com/government/aging-adult-services"}, "Anemia": {"education": "Definition:\n-Anemia is a condition that affects the red blood cells and is associated with a low hemoglobin level (males from 13.0 to 14.2 g/dL (130 to 142 g/L) and females from 11.6 to 12.3 g/dL (116 to 123 g/L)).\n-An inadequate supply of oxygen to body tissues may be caused by a deficiency in the size or number of cells, or in the amount of hemoglobin contained in the cells.\n\nAnemia types: \n-Pernicious or B12 deficiency anemia, thalassemia, iron deficiency anemia (most common)\nIron deficiency anemia is a microcytic anemia with small pale red blood cells and depletion of iron stores that is common in women of childbearing age.\n-Pernicious or B12 deficiency anemia is caused by a deficiency of intrinsic factor in the gastric juices produced by the stomach, which results in malabsorption of vitamin B12 necessary for DNA synthesis and maturation of red blood cells. This anemia can be severe.\n-Thalassemia is a group of diseases involving inadequate production of normal hemoglobin, which causes decreased erythrocyte production, and includes thalassemia minor, thalassemia intermedia, and thalassemia major.\n-Thalassemia minor can be asymptomatic, with mild to moderate anemia with microcytosis and hypochromia, and seldom requires blood transfusions.\n-Thalassemia intermedia (non-transfusion-dependent thalassemia) may cause mild to severe anemia; patients do not require blood transfusions for survival, but may occasionally in periods of stress (eg, pregnancy, infection).\n-Thalassemia major (transfusion-dependent thalassemia) may cause severe anemia and require regular lifelong blood transfusions for survival. It can be a life-threatening condition in which growth, both physical and mental, is often delayed.\n\nCauses:\n-Blood loss (eg, trauma, post-surgery, heavy menses)\n-Cancer\n-Chronic aspirin or nonsteroidal anti-inflammatory drug use\n-Chronic infection or inflammation\n-Chronic kidney disease\n-Diet (eg, vitamin or mineral deficits, excessive cow's milk intake)\n-Gastrointestinal disease (eg, celiac disease, irritable bowel syndrome, ulcerative colitis, Crohn disease, or peptic ulcer disease)\n-Genetics (eg, thalassemia)\n-History of anemia\n-Immunologic disease\n-Iron absorption decreased (eg, due to gastric surgery)\n-Lactation\n-Medication side effect (eg, chemotherapy, proton pump inhibitors)\n\nSymptoms:\n-Appetite loss\n-Cold intolerance\n-Concentration difficulty\n-Dizziness\n-Dyspnea on exertion\n-Edema of lower extremities\n-Fatigue\n-Hair loss\n-Headache\n-Heartbeat fast or irregular\n-Nausea and vomiting\n-Pale mucous membranes, conjunctiva, and nail beds\n-Pica\n-Weakness\n\nDiagnosis:\n-Based on medical history, risk factors, physical examination, and diagnostic tests\n-Complete blood count (CBC) with differential\n-Gastric analysis\n-Imaging studies\n-Oral Schilling test with and without intrinsic factor\n-Serum ferritin level, serum iron, total iron-binding capacity (TIBC), reticulocyte count, and RBC indices\n-Urinalysis\n-Stool for occult blood\n\nTreatment:\n-Blood transfusion\n-Comorbid condition management\n-Depends on specific clinical condition and prognosis\n-Medication management\n-Nutritional therapy\n-Surgery, if indicated\n-Symptom management", "diet": "", "online": "", "community": ""}, "Anxiety": {"education": "An anxiety disorder is the most common behavioral health condition. \n-It is a serious condition that causes distress and might affect the ability to lead a normal life. Worry and fear are always there. \nThere are many different types of anxiety disorders, like panic disorder (PD), generalized anxiety disorder (GAD), and phobic anxiety disorder (like social phobia).\n\nWhat causes it?\n - Behavior learned growing up \n-Chemical changes in the brain \n-Stress \n-Other behavioral health conditions \n-Some things may increase the risk. \u2013 Family history (genetics) \u2013 Major life changes, like loss of a loved one, moving, changing jobs, or having a baby \u2013 Triggers from a personal problem\n\nHow is it treated?\n -Goals for care \u2013 Cut down symptoms and stay active \u2013 Slow or stop the condition from getting worse \n-Medicines \u2013 Anticonvulsants work in the brain to control nerve activity. \u2013 Anxiolytics help reduce symptoms caused by anxiety. \u2013 Atypical antipsychotics help mood and thinking problems. \u2013 Monoamine oxidase inhibitors (MAOIs) help mood problems and manage other conditions. \u2013 Selective serotonin reuptake inhibitors (SSRIs) help reduce symptoms of depression and anxiety. \u2013 Serotonin-norepinephrine reuptake inhibitors (SNRIs) help mood problems and other symptoms. \u2013 Tranquilizers help relax brain activity. \u2013 Tricyclic antidepressants (TCAs) help reduce symptoms of depression and anxiety.\n -You may need to work with a psychiatrist, psychologist, social worker, or counselor.", "diet": "", "online": "", "community": ""}, "Arthritis": {"education": "Arthritis is a condition that causes swelling and pain in the joints. The joint\ntissue is made of cartilage.\n\u2013 Cartilage is the rubbery tissue in the joints where 2 bones meet.\n\u2013 Cartilage can wear away over time.\n\u2013 The 2 bones in the joint then rub against each other causing pain,\nswelling, and stiffness.\n\u2013 The joint may become knobby-looking or look out of shape.\n\nThere are 6 types of arthritis.\n\u2013 Fibromyalgia\n It is a group of symptoms that can occur by itself or with a different\ntype of arthritis.\nWomen get fibromyalgia more than men.\nIt is a lifelong (chronic) condition that seldom gets worse over time.\n\n\u2013 Gout\n-Gouty arthritis can affect any joint in the body, but usually attacks\nthe big toe.\nIt can harm the joints, tendons, and other tissues.\n It is one of the most common types found in older people.\n\u2013 Juvenile idiopathic arthritis (JIA)\nIt is a form of arthritis that develops in children under the age of 16.\n\n\u2013 Osteoarthritis\nOsteoarthritis is a common problem when you get older.\n-It can affect any joint in the body, but is more common in the hands,\nknees, hips, neck, and back.\n-It can be caused by a joint injury.\n\n\u2013 Psoriatic arthritis\n-Psoriatic arthritis can affect any joint in the body.\n-The body's immune system begins to attack healthy cells and tissue.\n\n\u2013 Rheumatoid arthritis\n-It is most common in the finger, wrist, hip, and knee joints.\n- Women get rheumatoid arthritis more than men.\n-It is a lifelong (chronic) condition.\n\nWhat causes it?\n\n-The cause of fibromyalgia is not known, but could be a result of a central\nnervous system problem, hormonal changes, injury, or trauma.\n-Gout is caused by too much uric acid in the blood.\n\u2013 Uric acid is found in some foods, like meat or fish. It is also a waste\nproduct that the kidneys get rid of.\n\u2013 Uric acid can form crystals that are deposited in the joints, causing pain.\n\u2013 Some water pills can also cause gout.\n-The cause of juvenile arthritis is not known.\n-Loss of cartilage is the cause of osteoarthritis.\n-A skin condition (psoriasis) is the cause of psoriatic arthritis.\n-The cause of rheumatoid arthritis is not known.\n\n-Some things may increase the risk.\n\u2013 Alcohol misuse\n\u2013 Being overweight (obesity)\n\u2013 Broken bones or joint injuries\n\u2013 Family history (genetics)\n\u2013 Health conditions that affect blood flow to the joint\n\u2013 Overuse of joints at work or in sports\n\nWhat are the symptoms?\n-Depression\n-Feel tired a lot\n-Joint pain and stiffness (worse when getting up in the morning or after\nactivities)\n-Lose movement or strength in affected joints\n-Pain and stiffness all over the body\n-Pitting of the nails\n-Problems paying attention or thinking clearly\n-Rubbing, grating, or crackling sounds when the joints move\n-Sleeping problems\n-Silver or gray scaly spots on the scalp, elbows, knees, or lower back\n-Sudden burning pain in the joints (worse at night)\n-Swelling and tenderness in the joints\n-Throbbing in one or more joints\n\nHow is it treated?\n\n-Goals for care\n\u2013 Cut down symptoms and stay active\n\u2013 Slow or stop the condition from getting worse\n\u2013 Treat and prevent problems\n\u2013 Better quality of life\nEquipment or supplies\n\u2013 Assistive devices\n\u2013 Braces\n\u2013 Walker\nMedicines\n\u2013 Analgesics help ease pain.\n\u2013 Anticonvulsants work in the brain to control nerve activity.\n\u2013 Antidepressants help mood problems and manage other conditions.\n\u2013 Immunosuppressives reduce the body's immune system response.\n\u2013 Narcotics help ease pain by blocking pain signals.\n\u2013 Nonsteroidal anti-inflammatory drugs (NSAIDs) help reduce swelling\nand pain.\n\u2013 PEGylated uric acid specific enzymes, xanthine oxidase inhibitors, and\nuricosurics reduce the level of uric acid in the body.\n\u2013 Steroids reduce swelling and treat bad flare ups.\nRehabilitation therapy can teach you how to care for yourself as much as you\ncan.\n\u2013 Occupational therapy to help with daily activities, like eating, dressing,\nand using the toilet\n\u2013 Physical therapy to help you move around better\nSurgery\n\u2013 Joint fusion - fuses joints together so the joint can be used again\n\u2013 Joint replacement surgery - removes the diseased joint and replaces it\nwith an artificial joint\n\u2013 Spine surgery - takes pressure off the spinal cord or the nerves in the\nspine\nYou may need to be treated in the hospital if you are very sick or have other\nhealth problems.\n\nHot Therapy (Heat)\nPurpose:\n-Helps relax stiff joints and muscles\n-Improves blood flow\n-Best used before activity or exercise\n\nExamples:\n-Warm compress or heating pad\n-Warm shower or bath\n-Warm towel or heat pack\n\nHow to use it safely:\n-Apply for 15\u201320 minutes at a time\n-Use a barrier (like a towel) between the heat source and your \nskin\n-Do not use heat on swollen or inflamed joints\n-Never sleep with a heating pad\n\nCold Therapy (Ice):\nPurpose:\n-Reduces swelling and inflammation\n-Numbs sore joints\n-Best used after activity or when joints are painful or swollen\n-Best used after activity or when joints are painful or swollen\nExamples:\n-Cold pack or ice pack\n-Frozen bag of peas (wrapped in a towel)\n-Cold gel pack\n\nHow to use it safely:\n-Apply for 10\u201315 minutes at a time\n-Always use a cloth or towel to protect your skin\n-Do not apply ice directly to the skin\n-Wait at least 1 hour between cold applications", "diet": "Dietary information if applicable", "online": "", "community": ""}, "Asthma": {"education": "Asthma is a chronic inflammatory disease that causes narrowing of the airways with mucosal edema and mucus production.\nComplex disease involving different allergic, inflammatory, and environmental components.\nAsthma attack occurs when muscles of the airways spasm or contract quickly, or when airways narrow and get swollen (inflamed) resulting in airflow reduction to lung.\n\nCauses:\n-Breathing cold air\n-Chalk dust\n-Cockroaches\n-Contact with a pet\n-Dust mites\n-Eating some types of foods\n-Emotional stress or reactions (like surprise, anger, or shock)\n-Exercise\n-Heartburn\n-Mold\n-Paint fumes\n-Pollen\n-Smoke\n-Taking certain medications\n-Viral infection (like a cold or flu)\n\nSymptoms:\n-Cough\n-Chest pain due to pressure or tightness\n-Dyspnea\n-Activity intolerance\n-Sleep problems because it is hard to breathe\n-Wheezing\n\nDiagnosis:\n-Based on medical history, risk factors, physical examination, and diagnostic tests\n-Risk factor evaluation\n-Lung function tests (spirometry) (may be done to show if there are reversible airway problems)\n-Allergy tests possible\n-X-rays possible\n\n\nTreatment:\n-Lifestyle changes (eg, avoiding triggers)\n-Self-care activities (diet, activity)\n-Smoking cessation[D]\n-Comorbid condition management(10)\n-Controller and reliever medications\n-Immunotherapy\n-Oxygen therapy\n-Symptom management", "diet": "", "online": "", "community": ""}, "Atrial Fibrillation (AFib)": {"education": "Atrial fibrillation is a common heart rhythm abnormality (arrhythmia) with uncoordinated atrial activity with ineffective atrial contraction.\nIn atrial fibrillation, the atria beat irregularly and are ineffective in pumping blood. In response, the ventricles beat irregularly and quickly.\nAtrial fibrillation can be present continuously or intermittently.\n\nCauses:\nIsolated condition or can occur with other diseases\nAlcohol or stimulants such as caffeine or decongestants\nHeart disease\nLung disease\nThyroid disease\n\nSymptoms;\nChest pain\nDizziness\nFainting(10)\nHeartbeat fast or irregular\nFatigue\nCognitive changes (eg, confusion, memory loss)(11)\nDyspnea\n\nDiagnosis:\n-Based on medical history, risk factors, physical examination, and diagnostic tests\n-Electrocardiogram (ECG) - detects and records the electrical activity of the heart to check electrical patterns\n-Holter monitoring or long-term monitoring with electrocardiographic loop recorders may be necessary if atrial fibrillation is present only some of the time.\n-Echocardiogram - provides information about the size and shape of the heart and how well it is working\n-Electrophysiology study - to identify the arrhythmia and seek sites for a curative ablation\n-Stress testing during exercise, or using medication, is a way to make the heart work hard while its response is recorded.\n\nTreatment:\nLifestyle changes (eg, nutrition, exercise, tobacco cessation)\nSelf-care activities (eg, diet, activity, medication)\nSurgery, if indicated(17)\nComorbid condition management\nSymptom management", "diet": "Diet Tips for Heart Health: \n\n-Eat more fruits and vegetables every day, they help keep your \nheart strong.\n-Choose whole grains like brown rice, whole wheat bread, or \noatmeal instead of white bread or white rice.\n-Pick lean proteins such as chicken without skin, fish, beans, \nor tofu.\n-Limit salt by not adding extra at the table and avoiding processed or fast foods. Use herbs and spices for flavor instead.\n-Cut back on fatty foods like fried foods, butter, cheese, and fatty cuts of meat. Choose healthier fats like olive oil or avocado \nin small amounts.\n-Drink plenty of water and avoid sugary drinks.\n\n\nReference:\nAmerican Heart Association. (2023). Healthy eating for a healthy heart. https://www.heart.org/en/healthy-living/healthy-eating\n\nDASH diet:\n-Eat more of:\n-Fruits and vegetables\n-Whole grains (brown rice, oats, whole wheat bread)\n-Low-fat or fat-free dairy products\n-Lean meats, poultry, and fish\n-Nuts, seeds, and legumes (beans, lentils)\n-Limit or avoid:\n-Salt (sodium): aim for less than 2,300 mg/day or 1,500 mg if advised\n-Processed and packaged foods (chips, canned soup, deli meats)\n-Sugary drinks and sweets\n-Foods high in saturated fat (fried foods, fatty meats, full-fat dairy)\n-Alcohol (limit to 1 drink/day for women, 2 for men)\n-Read nutrition labels and choose \u201clow-sodium\u201d or \u201cno-salt-added\u201d products\n-Cook at home more often and avoid adding salt at the table\n-Use herbs, lemon, garlic, and spices for flavor instead of salt\n-Rinse canned vegetables and beans to remove extra sodium", "online": "", "community": ""}, "Bipolar Disorder": {"education": "", "diet": "", "online": "", "community": ""}, "BPH": {"education": "BPH is an enlarged prostate gland. It is common in older men and can affect how you urinate.\n\nCommon urinary symptoms include:\n-Trouble starting urination\n-Weak urine stream or dribbling\n-Feeling like the bladder doesn\u2019t fully empty\n-Frequent or urgent need to urinate, especially at night\n-Risk of urine retention (not being able to pee)\n\nHow it affects quality of life:\n-Disrupted sleep due to night-time urination\n-Increased risk of bladder infections or kidney problems if left untreated\n\nSelf-care tips:\n-Don\u2019t hold in urine for long periods\n-Limit fluids at night\n-Avoid caffeine and alcohol (can irritate the bladder)\n-Empty your bladder completely when urinating\n\n\nReference:\nAmerican Urological Association (AUA). (2023). \nBenign Prostatic Hyperplasia (BPH).\nRetrieved from: https://www.auanet.org/benign-prostatic-hyperplasia", "diet": "", "online": "", "community": ""}, "Cirrhosis": {"education": "", "diet": "", "online": "", "community": ""}, "CKD": {"education": "A disease causing damage that reduces functioning of kidney\nKidneys remove toxic waste, excess water, and salts; help in blood pressure control; produce erythropoietin; balance calcium and phosphate; and maintain blood in a neutral state.\nDamage to the kidney results in fluid and electrolyte imbalance and accumulation of metabolic waste and toxins.\nKidney function/decline is measured by glomerular filtration rate (GFR).\nThe decline in GFR and urine output with an increase in serum creatinine can be categorized as an acute or chronic disease.\nAcute kidney disease is sudden and usually reversible.\nChronic kidney disease is gradual, progressive, and present for more than 3 months with a severity of stage 1 to 5.\n\n\nTriggers for kidney disease include;\nDiabetes\nHeart disease\nHypertension\nInfections\n(glomerulonephritis, recurrent urinary tract infections)\nKidney injury\nChronic medication use (NSAIDs, ibuprofen, celecoxib)\nObstruction (kidney stones, tumors, enlarged prostate)\nPolycystic kidney disease\nRenal artery disease\nSmoking\n\nSymptoms;\nAmmonia breath or metal taste in mouth\nAppetite changes\nBack or flank pain\nEdema of lower extremities\nFatigue\nItching\nNausea or vomiting\nShortness of breath\nUrine problems\n\nDiagnosis:\nBased on medical history, risk factors, physical examination, and diagnostic tests\nImaging studies\n\nTreatment:\nADL and IADL support\nBlood glucose control\nBlood pressure control\nFluid management\nHemodialysis or peritoneal dialysis\nSelf-care activities (eg, diet, activity, medication)\nSymptom management\nSurgery, if indicated\nMedications for pre-existing conditions may need to be changed (type or dose).\nComorbid condition management\nEnd-of-life or palliative care\n\nSelf-care plan information;\n-Daily care (eg, action plan, diet, staying healthy)\n-Adherence to plan necessary to achieve goals, and complications\n of nonadherence (eg, exacerbations, progression, comorbidities)\n-Medication purpose, use, effects, side effects, and considerations (eg, timing before meals or exercise)\n-Health checks, diary, and action plans\n(eg, blood pressure, weight changes)\n-Diet considerations (eg, fluids, protein, minerals)\n-Weight monitoring and management\n-Exercise program within provider's recommendations \n-Sleep hygiene (eg, regular pattern, calm sleep environment)\n-Energy conservation measures (eg, rest periods, sit often, healthy sleeping habits)\n-Pain management plan\n-Support group participation\n-Infection prevention measures (eg, hand hygiene, avoid crowds)\n-Lifestyle change plan (eg, psychotherapy, regular exercise, good sleep hygiene)\n-Symptom management\n(eg, bowel or bladder programs, fatigue care, pain care)\n-Behavioral health monitoring and care (eg, depression monitoring and management)\n-Stress management (eg, relaxation and coping techniques)(34)\n-Comorbid condition management\n-Wellness checkups (eg, vaccinations, screenings)\n-Advance care planning", "diet": "Follow the eating plan as your doctor told you.\n-You may need to change what you eat because of your kidney disease.\n-A nurse or dietitian can help you plan meals with foods that are OK to eat.\n-Ask your doctor if you need to avoid these foods.\n\u2013 High salt (sodium) foods will make your body hold water and raise your\nblood pressure.\n\u2013 High potassium foods, like potatoes, yogurt, green leafy vegetables,\nbeans, whole grains, fish, bananas, oranges, and salt substitutes\n\u2013 High phosphorus foods, like meats, dried beans and nuts, raisins, peas,\nand foods marked as enriched\n\u2013 High magnesium foods, like halibut, tuna, chocolate, spinach, greens,\nnuts, avocados, and whole grains\n\u2013 High calcium foods, like dairy products and enriched foods (like orange\njuice and cereal)\n-Talk to your doctor about what you should eat.\nRead the \"Nutrition Facts\" panel on packaged foods to see if that food is a\nhealthy choice. Look at the amounts of total calories, fat, sodium, and other\nnutrients in a serving.\n\u2013 Many packages have more than 1 serving.\n\u2013 If you eat more than 1 serving, multiply the nutrition amounts by the\nnumber of servings. This will tell you what nutrition amounts you are\nreally eating.", "online": "American Association of Kidney Patients\nhttps://www.niddk.nih.gov/\n\nThe National Kidney Foundation\nhttps://www.kidney.org/\n\nNational Institute of Diabetes and Digestive and Kidney Diseases\nhttps://www.niddk.nih.gov/", "community": "Davita Kidney Smart Classes \n\nFree online and in person classes providing education on kidney disease and lifestyle management.\n\nCall 1-855-343-4951 or email info@kidneysmart.org"}, "Congestive Heart Failure": {"education": "CHF occurs when the heart cannot pump blood efficiently to meet the body\u2019s needs. This can cause fluid to back up in the lungs and other areas, leading to symptoms like shortness of breath, swelling, and fatigue.\n\nRisk Factors:\n-CAD and HTN\n-Heart valve disease\n-Previous heart attack\n-Arrhythmias (irregular heartbeat)\n-Obesity or diabetes\n\nExpected Outcomes with Management:\n-Fewer hospital admissions\n-Reduced swelling and shortness of breath\n-Increased energy and activity tolerance\n-Slowed progression of heart failure\n\nAmerican College of Cardiology/American Heart Association. (2022). 2022 ACC/AHA/HFSA guideline for the management of heart failure. Journal of the American College of Cardiology, 79(17), e263\u2013e421. https://doi.org/10.1016/j.jacc.2021.12.012", "diet": "Diet Tips for Heart Health: \n\n-Eat more fruits and vegetables every day, they help keep your \nheart strong.\n-Choose whole grains like brown rice, whole wheat bread, or \noatmeal instead of white bread or white rice.\n-Pick lean proteins such as chicken without skin, fish, beans, \nor tofu.\n-Limit salt by not adding extra at the table and avoiding processed or fast foods. Use herbs and spices for flavor instead.\n-Cut back on fatty foods like fried foods, butter, cheese, and fatty cuts of meat. Choose healthier fats like olive oil or avocado \nin small amounts.\n-Drink plenty of water and avoid sugary drinks.\n\n\nReference:\nAmerican Heart Association. (2023). Healthy eating for a healthy heart. https://www.heart.org/en/healthy-living/healthy-eating\n\nDASH diet:\n-Eat more of:\n-Fruits and vegetables\n-Whole grains (brown rice, oats, whole wheat bread)\n-Low-fat or fat-free dairy products\n-Lean meats, poultry, and fish\n-Nuts, seeds, and legumes (beans, lentils)\n-Limit or avoid:\n-Salt (sodium): aim for less than 2,300 mg/day or 1,500 mg if advised\n-Processed and packaged foods (chips, canned soup, deli meats)\n-Sugary drinks and sweets\n-Foods high in saturated fat (fried foods, fatty meats, full-fat dairy)\n-Alcohol (limit to 1 drink/day for women, 2 for men)\n-Read nutrition labels and choose \u201clow-sodium\u201d or \u201cno-salt-added\u201d products\n-Cook at home more often and avoid adding salt at the table\n-Use herbs, lemon, garlic, and spices for flavor instead of salt\n-Rinse canned vegetables and beans to remove extra sodium", "online": "", "community": ""}, "COPD": {"education": "COPD is a lung disease that is characterized by progressive obstruction to airflow.\n\n-COPD includes chronic bronchitis and emphysema.\n\nCauses:\n-Inhaling agents that are toxic to the lungs.\n-tobacco smoke.\n-Recurring lung infections during childhood are a risk factor for developing COPD.\n\nCommon Symptoms:\n-Cough\n-Activity intolerance\n-Dyspnea\n-Sleep problems because it is hard to breathe\n-Increased amount of sputum (phlegm) or change in sputum color\n-Chest pain due to pressure or tightness\n-Wheezing\n\nHow is it treated?\n\nGoals for care\n\u2013 Cut down symptoms and stay active\n\u2013 Slow or stop the condition from getting worse\n\u2013 Treat and prevent problems\n\u2013 Better quality of life\n-Breathing and chest exercises\n\nEquipment or supplies\n\u2013 Nebulizer\n\u2013 Oxygen therapy\n\u2013 Peak flow monitor\n\n-Medicines\n\u2013 Antibiotics treat infections caused by bacteria.\n\u2013 Inhaled corticosteroids work over time to prevent and reduce swelling in the airway.\n\u2013 Long-acting anticholinergics work over time to relax muscles around the airway.\n\u2013 Long-acting beta2-agonists work over time to open the airway.\n\u2013 Methylxanthines help relax and open the airway.\n\u2013 Short-acting anticholinergics work quickly to relax muscles around the airway.\n\u2013 Short-acting beta2-agonists work quickly to relax the muscles in the airway and make it easier to breathe.\n\u2013 Steroids reduce swelling and treat bad flare ups.\n- Pulmonary rehabilitation to help get the lungs strong again\n- Surgery\n\u2013 Lung reduction surgery - removes damaged areas of the lung so it can work better\n\u2013 Lung transplant - replaces part or all of the damaged lung with a healthy one from another person\n-You may need to be treated in the hospital if you are very sick or have other health problems.", "diet": "", "online": "", "community": ""}, "Coronary Artery Disease": {"education": "CAD occurs when the arteries that supply blood to your heart\n muscle become narrowed or blocked by plaque buildup (atherosclerosis). This reduces blood flow and oxygen to the heart, which can lead to chest pain (angina) or heart attacks.\n\nWhat You Might Feel:\n-Chest pain or pressure (angina), especially with activity or stress\n-Shortness of breath\n-Fatigue\n-Sometimes no symptoms until a heart attack happens\n\nHow to Manage CAD:\n-Take your medications\n-Medications help prevent chest pain, lower cholesterol, control blood pressure, and prevent blood clots.\n-Common meds: statins, beta-blockers, aspirin, nitroglycerin.\n\nEat heart-healthy\n-Eat more fruits, vegetables, whole grains, lean meats, and healthy fats (like olive oil).\n-Avoid salty, fried, or processed foods.\n\nGet active\n-Aim for at least 30 minutes of walking or light exercise most days.\n-Always check with your doctor before starting new exercise.\n\nQuit smoking\n-Smoking damages your blood vessels and increases heart attack\n risk.\n\nManage stress\n-Try deep breathing, meditation, or talking to someone you trust.\n\nReference:\nAmerican Heart Association \u2013 Coronary Artery Disease (CAD)\nhttps://www.heart.org/en/health-topics/consumer-healthcare/what-is-cardiovascular-disease/coronary-artery-disease", "diet": "Diet Tips for Heart Health: \n\n-Eat more fruits and vegetables every day, they help keep your \nheart strong.\n-Choose whole grains like brown rice, whole wheat bread, or \noatmeal instead of white bread or white rice.\n-Pick lean proteins such as chicken without skin, fish, beans, \nor tofu.\n-Limit salt by not adding extra at the table and avoiding processed or fast foods. Use herbs and spices for flavor instead.\n-Cut back on fatty foods like fried foods, butter, cheese, and fatty cuts of meat. Choose healthier fats like olive oil or avocado \nin small amounts.\n-Drink plenty of water and avoid sugary drinks.\n\n\nReference:\nAmerican Heart Association. (2023). Healthy eating for a healthy heart. https://www.heart.org/en/healthy-living/healthy-eating\n\nDASH diet:\n-Eat more of:\n-Fruits and vegetables\n-Whole grains (brown rice, oats, whole wheat bread)\n-Low-fat or fat-free dairy products\n-Lean meats, poultry, and fish\n-Nuts, seeds, and legumes (beans, lentils)\n-Limit or avoid:\n-Salt (sodium): aim for less than 2,300 mg/day or 1,500 mg if advised\n-Processed and packaged foods (chips, canned soup, deli meats)\n-Sugary drinks and sweets\n-Foods high in saturated fat (fried foods, fatty meats, full-fat dairy)\n-Alcohol (limit to 1 drink/day for women, 2 for men)\n-Read nutrition labels and choose \u201clow-sodium\u201d or \u201cno-salt-added\u201d products\n-Cook at home more often and avoid adding salt at the table\n-Use herbs, lemon, garlic, and spices for flavor instead of salt\n-Rinse canned vegetables and beans to remove extra sodium", "online": "", "community": ""}, "Crohn's Disease": {"education": "Crohn's disease is a type of inflammatory bowel disease (IBD). It causes swelling of the tissues (inflammation) in your digestive tract, which can lead to abdominal pain, severe diarrhea, fatigue, weight loss and malnutrition.\n\nInflammation caused by Crohn's disease can involve different \nareas of the digestive tract in different people, most commonly the small intestine. This inflammation often spreads into the deeper layers of the bowel.\n\nSymptoms\nIn Crohn's disease, any part of your small or large intestine can be involved. It may involve multiple segments, or it may be continuous. In some people, the disease is only in the colon, which is part of the large intestine.\n\nSigns and symptoms of Crohn's disease can range from mild to severe. They usually develop gradually, but sometimes will come on suddenly, without warning. You may also have periods of time when you have no signs or symptoms (remission).\n\nWhen the disease is active, symptoms typically include:\n\nDiarrhea\nFever\nFatigue\nAbdominal pain and cramping\nBlood in your stool\nMouth sores\nReduced appetite and weight loss\nPain or drainage near or around the anus due to inflammation from a tunnel into the skin (fistula)", "diet": "", "online": "", "community": ""}, "CVA/Stroke": {"education": "Stroke occurs when blood supply to the brain is interrupted or reduced, resulting in a reduction of oxygen to the brain. It may be defined as ischemic or hemorrhagic.\n\nStroke is not a disease; rather, it is a clinical syndrome caused by one of many possible diseases. The clinical features, prognosis, and treatments will vary.\n\nIschemic stroke - A sudden loss of function resulting from disruption of blood supply to part of the brain.\nAlso known as cerebrovascular accident (CVA) or \"brain attack\"\nMay be a result of a thrombosis, embolism, or systemic hypoperfusion\nAccounts for 87% of strokes\n\nHemorrhagic stroke - Caused by infiltration and accumulation of blood into the brain tissue, the ventricles, or the subarachnoid space.\nHypertension is the leading cause of hemorrhagic strokes.\nIschemia and infarction may occur distally to the hemorrhage due to the interrupted blood supply.\nAssociated with greater morbidity and mortality\n\nCauses:\nHigh blood pressure (hypertension)\nHigh cholesterol (hypercholesterolemia)\nDiabetes or insulin resistance\nCoronary artery disease\nSickle cell disease\nAtrial fibrillation\nSmoking\nOral contraceptive and hormone replacement use\nOverweight or obesity\nAlcohol or substance misuse\nFamily history (genetics)\n\nSymptoms:\nSudden numbness or weakness of the face, arm, or leg, especially on one side of the body\nSudden severe headache with no known cause\nSudden confusion or trouble speaking or understanding speech\nSudden trouble walking, dizziness, or loss of balance or coordination\nSudden trouble seeing in one or both eyes", "diet": "", "online": "", "community": ""}, "DDD": {"education": "Degenerative disk disease (sometimes spelled degenerative disc disease) isn\u2019t actually a disease, but rather, it\u2019s a condition that occurs when your spinal disks wear down. Spinal disks are rubbery cushions between your vertebrae (bones in your spinal column). They act as shock absorbers and help you move, bend and twist comfortably. Everyone\u2019s spinal disks degenerate over time \u2014 it\u2019s a natural part of aging.\nWhen the cushions wear away, the bones can start to rub together. This contact can cause pain and other problems, like:\n-Adult scoliosis, where your spine curves\n-Herniated disk, also called a bulged, slipped or ruptured disk\n-Spinal stenosis, when the space in your spinal canal narrows\n-Spondylolisthesis, when vertebrae move in and out of place\n\nTypes of degenerative disk disease\nDisk degeneration mostly affects your lower back (lumbar spine) or neck (cervical spine).\n-Lumbar degenerative disk disease. Your lower back (lumber spine) has five vertebrae. These are the largest bones in your back. Healthcare providers call them L1 to L5. Disks in your spine (spinal disks) separate each of these vertebrae. Approximately 90% of degenerative disk disease occurs in the lowest portions of your lumbar spine.\n-Cervical degenerative disk disease. This type of degenerative disk disease occurs in the seven vertebrae of your neck (cervical spine). These vertebrae are each separated by a spinal disk. Your cervical spine is responsible for all kinds of movements, including looking up and down and turning your head from side to side. Degenerative disk disease in this area can make those movements painful.\n-Multilevel degenerative disk disease. Multilevel degenerative disk disease is when degenerative disk disease affects more than one disk or level of your spine. So, areas of your lumbar spine and your cervical spine could be affected.\n\nRisk factors for degenerative disk disease\nDegenerative disk disease is most common in people age 40 and older. Some factors increase your risk of developing degenerative disk disease, including:\n\n-Acute injuries, like falls\n-Obesity\n-Sex, with women being more likely to experience symptoms\n-Smoking\n-Working a physically demanding job\nDegenerated disks can increase your risk of developing other spinal conditions. Common spine problems include:\n-Osteoarthritis\n-Scoliosis\n-Spinal stenosis\n-Spondylolisthesis\n-Radiculopathy\n-Spondylolysis\n\nHow do you treat degenerative disk disease?\nUsually, your healthcare provider will recommend noninvasive degenerative disk disease treatment options first. Your treatment may include:\n-Physical therapy: Participating in strengthening and stretching exercises with a trained physical therapist\n-Medications: Taking nonsteroidal anti-inflammatory drugs (NSAIDs), acetaminophen, neuromodulation medication or steroids\n-Steroid injections: Injecting medicine near your spinal nerves, disks or joints to reduce inflammation and pain\n-Radiofrequency neurotomy: Using electric currents to burn sensory nerves and prevent pain signals from reaching your brain\n\nDegenerative disk disease self-care\nSome people find pain relief through at-home remedies. At-home treatments may decrease pain for a short time. But they\u2019re not a long-term treatment for severely degenerated disks. You may try:\n-Physical activity. Low-impact activity like walking or swimming can strengthen back muscles and relieve some pain.\n-Hot and cold therapy. Alternating ice packs and heating pads every 10 to 15 minutes up to four times per day may reduce soreness and inflammation.\n-Stretching. Gentle yoga and stretching throughout the day may improve posture and relieve tension.\n-Traction. Traction may improve symptoms and relieve tension.\n-Degenerative disk disease surgery\nMost people don\u2019t need surgery for degenerative disk disease. But if you\u2019ve tried multiple nonsurgical treatments and have persistent pain and/or weakness, surgery may be a good option.\n\n\nResources:\nhttps://my.clevelandclinic.org/health/diseases/16912-degenerative-disk-disease", "diet": "", "online": "", "community": ""}, "Depression": {"education": "Depression is a serious health condition.\n There are different types of depression, like major depressive disorder, mild\nor long term depression (dysthymia), or seasonal affective disorder (SAD).\n\n- It affects everything you do in life.\n\u2013 Eating\n\u2013 Sleeping\n\u2013 Feelings about yourself\n\u2013 Feelings about your life\n\nWhat causes it?\n-The cause is not known.\n-Some things may increase the risk.\n\u2013 Alcohol or drug misuse\n\u2013 Chemical changes in the brain\n\u2013 Family history (genetics)\n\u2013 Major life changes, like loss of a loved one, moving, changing jobs, or\nhaving a baby\n\u2013 Stress\n\u2013 Triggers from a personal problem\n\nWhat you need to know \n\nWhat are the symptoms?\n\u2022 Feel worthless, hopeless, or guilty\n\u2022 Little or no interest in activities or hobbies\n\u2022 Little or no interest in being with friends and family\n\u2022 Little or no interest in sex\n\u2022 Poor personal hygiene, like not bathing or dressing nicely\n\u2022 Problems with sleep or sleeping too much\n\u2022 Thoughts of death or suicide\n\u2022 Tired, weak, or problems focusing\n\nHow is it treated?\n\u2022 Goals for care\n\u2013 Feel better and stay active\n\u2013 Slow or stop the condition from getting worse\n\u2013 Treat and prevent problems\n\u2013 Better quality of life\n\u2022 Medicines\n\u2013 Antidepressants help mood problems and manage other conditions.\n\u2013 Atypical antidepressants help mood problems and manage other\nconditions.\n\u2013 Monoamine oxidase inhibitors (MAOIs) help mood problems and\nmanage other conditions.\n\u2013 Selective serotonin reuptake inhibitors (SSRIs) help reduce symptoms of\ndepression and anxiety.\n\u2013 Serotonin-norepinephrine reuptake inhibitors (SNRIs) help mood\nproblems and other symptoms.\n\u2013 Tricyclic antidepressants (TCAs) help reduce symptoms of depression\nand anxiety.", "diet": "", "online": "", "community": ""}, "Diabetes": {"education": "Diabetes is a chronic multisystem metabolic disorder related to abnormal insulin secretion, insulin action, or both\nDisease in which blood sugar (glucose) is too high\nGlucose comes from the breakdown of foods into chemicals, which is called metabolism.\nInsulin is a protein that is made by an organ called the pancreas, and its function is to help glucose get into cells to give the body energy.\nDiabetes happens when the body does not make enough or any insulin (type 1) or the insulin that is made is not used well (type 2 and gestational). \n\nSelf-care plan information: \n-Self-monitoring (blood glucose monitoring and symptoms check)\n-Medication purpose, use, effects, side effects, and considerations (e.g., timing before meals or exercise)\n-Health checks, diary, and action plans (eg, blood glucose, weight, medication administration, diet, and activity)(\n-Diet considerations (eg, impact of diet and exercise on blood sugar and disease outcomes)\n-Exercise program within provider's recommendations\n-Symptom management\n-Action plan adherence \n-Foot care\n-Medical equipment use and care\n-Comorbid condition management\n-Laboratory monitoring, as needed\n-Stress management \n-Wellness checkups\n-Preconception counseling, if indicated", "diet": "With diabetes, you should follow a restricted carbohydrate diet. It is recommended to follow the Diabetes Plate for meal planning. This consists of 50% of a 9-inch plate containing non starchy vegetables, 25% lean proteins, and 25% complex/quality carbohydrates.\n\n-Non-starchy vegetables as a foundation for the plate\n-Lean proteins and plant-based sources of protein  \n-Quality carbohydrates like starchy vegetables, fruits, whole grains, and low-fat milk\n-Less added sugar\n-Healthy fats\n-Less processed foods\n-Water or zero-calorie beverages\n\nThis includes limiting sugars and carbohydrates and favoring complex carbohydrates over simple carbohydrates. Carbohydrates are a major macronutrient and one of your body\u2019s primary sources of energy. Some weight loss programs discourage eating them, but the key is finding the right carbs, not avoiding them completely. Complex carbohydrates are digested more slowly and release glucose into the blood stream more gradually. Simple carbohydrates are digested quickly and spike blood sugar faster and higher.\n\n-Eat the most of these: whole, unprocessed, non-starchy vegetables. Non-starchy vegetables like lettuce, cucumbers, broccoli, tomatoes, and green beans have a lot of fiber and very little carbohydrate, which results in a smaller impact on your blood glucose. These should make up half your plate according to the Diabetes Plate Method.\n\n -Eat some of these: whole, minimally processed carbohydrate foods. These are your starchy carbohydrates, and include fruits like apples, blueberries, strawberries and cantaloupe; whole intact grains like brown rice, whole wheat bread, whole grain pasta and oatmeal; starchy vegetables like corn, green peas, sweet potatoes, pumpkin and plantains; and beans and lentils like black beans, kidney beans, chickpeas and green lentils. If you\u2019re using the Plate Method, foods in this category should make up about a quarter of your plate.\n\n -Try to eat less of these: refined, highly processed carbohydrate foods and those with added sugar. These include sugary drinks like soda, sweet tea and juice, refined grains like white bread, white rice and sugary cereal, and sweets and snack foods like cake, cookies, candy and chips.\nhttps://diabetes.org/food-nutrition/eating-healthy\nhttps://diabetes.org/food-nutrition/understanding-carbs", "online": "American Diabetes Association\nwww.diabetes.org\n\nNational Institute of Diabetes and Digestive and Kidney Diseases \nwww.niddk.nih.gov\n\nDiabetes Food Hub\nhttps://diabetesfoodhub.org/", "community": ""}, "Dyslipidemia": {"education": "Dyslipidemia:\n-Dyslipidemia means your blood has too much \u201cbad\u201d cholesterol \n(LDL) or triglycerides, and not enough \u201cgood\u201d cholesterol (HDL).\n-Too much LDL (bad cholesterol) builds up inside your blood vessels and forms plaque, which narrows and hardens your arteries, making it harder for blood to flow.\n\nWhy it matters:\n-Plaque buildup increases your risk of:\n-Heart disease\n-Heart attacks\n-Stroke\n\nHow Excess Weight Affects Your Health:\n-Being overweight puts extra strain on your heart and blood vessels. It can:\n-Raise your blood pressure\n-Increase LDL (bad) cholesterol and triglycerides\n-Lower HDL (good) cholesterol\n-Make your body more resistant to insulin, raising your risk for diabetes\n\nWhat You Can Do:\n-Eat heart-healthy foods: More fruits, veggies, whole grains, lean proteins\n-Limit salt and fried foods\n-Be active: Even walking 15\u201330 minutes a day helps\n-Take your medications as prescribed\n-Check your blood pressure regularly\n-Follow up with your doctor and dietitian\n\nReference: \nAmerican Heart Association. (2023). Understanding blood pressure readings. https://www.heart.org/en/health-topics/high-blood-pressure/understanding-blood-pressure-readings", "diet": "Diet Tips for Heart Health: \n\n-Eat more fruits and vegetables every day, they help keep your \nheart strong.\n-Choose whole grains like brown rice, whole wheat bread, or \noatmeal instead of white bread or white rice.\n-Pick lean proteins such as chicken without skin, fish, beans, \nor tofu.\n-Limit salt by not adding extra at the table and avoiding processed or fast foods. Use herbs and spices for flavor instead.\n-Cut back on fatty foods like fried foods, butter, cheese, and fatty cuts of meat. Choose healthier fats like olive oil or avocado \nin small amounts.\n-Drink plenty of water and avoid sugary drinks.\n\n\nReference:\nAmerican Heart Association. (2023). Healthy eating for a healthy heart. https://www.heart.org/en/healthy-living/healthy-eating\n\nDASH diet:\n-Eat more of:\n-Fruits and vegetables\n-Whole grains (brown rice, oats, whole wheat bread)\n-Low-fat or fat-free dairy products\n-Lean meats, poultry, and fish\n-Nuts, seeds, and legumes (beans, lentils)\n-Limit or avoid:\n-Salt (sodium): aim for less than 2,300 mg/day or 1,500 mg if advised\n-Processed and packaged foods (chips, canned soup, deli meats)\n-Sugary drinks and sweets\n-Foods high in saturated fat (fried foods, fatty meats, full-fat dairy)\n-Alcohol (limit to 1 drink/day for women, 2 for men)\n-Read nutrition labels and choose \u201clow-sodium\u201d or \u201cno-salt-added\u201d products\n-Cook at home more often and avoid adding salt at the table\n-Use herbs, lemon, garlic, and spices for flavor instead of salt\n-Rinse canned vegetables and beans to remove extra sodium", "online": "", "community": ""}, "Fall/Safety Precautions": {"education": "Fall-prevention instructions:\n-Use physical therapy to customize a home exercise program to improve balance and strength\n-Manage clinical issues (eg, medications causing imbalance or dizziness, foot pain, vision problems, cognitive change)\n-Correct environmental hazards (eg, clear cluttered hallways, remove throw rugs, install handrails).\n-Use of assistive devices\n\nEducate on Self-care safety activities:\n-Rise slowly from lying or sitting position.\n-Wear glasses or contact lenses, if needed.\n-Use handrails, grab bars, or adaptive devices as needed.\n-Wear shoes with nonslip soles.\n-Use no-slip mats in shower or tub.\n-Pet-related falls mitigation (eg, not chasing pet, obedience training)\n-Know which medication may cause problems (eg, dizziness, weakness, or balance problems)\n-Exercise program within provider's recommendations\n\nOrthostatic hypotension management:\n-Blood pressure monitoring \n-Adequate fluid intake: fluid intake of at least 2 to 2.5 L per day is recommended, unless contraindicated\n-Increase salt intake, as clinically appropriate\n-Keep head-up tilt of bed at night\n-Compression stockings, if ordered\n-Avoid aggravating factors", "diet": "", "online": "", "community": ""}, "Hearing Issues": {"education": "Ways to work around hearing loss:\n-Hearing aid or assistive deviceSupporting evidence, suggestions, and alternatives\n-Writing or drawing pictures\n-Reading lips\n-Technical aids (eg, TTY phone service or closed-captioning)\n-Gestures or sign language\n\nWays to prevent further hearing problems:\n-Avoid places with loud persistent noises.\n-Keep environmental noises down when trying to listen.\n-Manage ear problems (eg, infection) quickly.\n\nWays caregivers can help with communication:\n-Devote full attention when speaking or listening to patient, and -avoid distracting environments (eg, those with competing noise).\n-Face patient when speaking, talk slowly, and do not cover mouth.\n-Ask patient to repeat back what they heard.\n-Avoid jumping from topic to topic, and speak in simple sentences.\n-Provide other ways to communicate (eg, offering paper for writing\n-Promote use of hearing aids, as appropriate.", "diet": "", "online": "", "community": ""}, "Hx of Renal Cancer": {"education": "Importance of Routine Testing:\n-After kidney cancer surgery, it\u2019s important to have regular imaging tests like CT scans or MRIs, and blood tests such as BUN and creatinine.\n-These help your doctor check how your kidneys are working and make sure the cancer has not come back.\n\nKnow the Warning Signs:\n-Call your doctor if you notice any of the following:\n-Flank pain (pain in your side or back)\n-Blood in your urine (hematuria)\n-Unexplained weight loss\n-Constant tiredness or fatigue\n-These could be signs of kidney problems or cancer returning and need to be checked right away.\n\nStay on Track with Follow-Ups:\n-You may need to see a urologist, oncologist, or nephrologist regularly.\n-Keep all appointments even if you feel well \u2014 some problems may not cause symptoms right away.\n\nLifestyle Changes to Stay Healthy:\n-Quit smoking if you smoke. Smoking increases the risk of kidney and other cancers.\n-Limit alcohol use \u2014 excessive drinking can affect your kidney function and overall health.\n\n\nReference:\n-American Cancer Society \u2013 Kidney Cancer:\nhttps://www.cancer.org/cancer/kidney-cancer.html\n\n-National Cancer Institute \u2013 Renal Cell Cancer Treatment (PDQ\u00ae):\nhttps://www.cancer.gov/types/kidney/patient/kidney-treatment-pdq", "diet": "", "online": "", "community": ""}, "Hyperparathyroidism": {"education": "Hyperparathyroidism develops from too much activity in one or more parathyroid glands, the grain-of-rice-sized structures near the thyroid glands in your neck. The parathyroid glands create parathyroid hormone (PTH), which boosts the levels of calcium in the bloodstream when needed. Too much PTH is produced from:\n-Primary Hyperparathyroidism, which is usually tied to an enlargement (hyperplasia) of a parathyroid gland, a benign (non-cancerous) growth (adenoma) or (in rare cases) a malignant (cancerous) tumor. The reasons for enlargement are usually undetermined but can be hereditary.\n-Secondary Hyperparathyroidism, when certain medical conditions skew the levels of calcium and a related mineral, phosphate. That prompts the parathyroid glands to compensate and is caused by such problems as a vitamin D or calcium deficiency, or by kidney failure.\nThe extra PTH causes the release of calcium from the bones, which can lead to high levels of the mineral in the blood (hypercalcemia) and problems like:\n-Osteoporosis: a weakening of the bones that can make them more susceptible to fractures\n-Osteopenia: a condition that often precedes osteoporosis\n-Kidney Stones: hard deposits that result from excess calcium getting in the urine and getting filtered by the kidneys\n-Cardiovascular Disease: research suggests that high-calcium levels are associated with high blood pressure (hypertension) and some types of heart disease\nSelf Management\nTreatments for hyperparathyroidism depend on:\n-The suspected cause\n-The severity of your symptoms\n-Your preferences\nPatients with modestly increased calcium and no symptoms may choose to hold off on interventions and instead visit us for regular checkups and careful monitoring, an approach called \u201cwatchful waiting.\u201d Your doctor might also recommend precautions such as:\n-Taking medication (if the hyperparathyroidism is due to kidney problems)\n-Drinking more fluids to prevent kidney stones\n-Exercising\n-Getting extra vitamin D or calcium\nSome kidney failure patients may need dialysis or a transplant. For more severe cases of primary hyperparathyroidism, your doctor may recommend surgically removing overactive glands and any tumors present.\n\nhttps://www.hopkinsmedicine.org/health/conditions-and-diseases/hyperparathyroidism", "diet": "", "online": "", "community": ""}, "Hypertension": {"education": "Hypertension, or high blood pressure, happens when the force of blood against your artery walls is too high. Over time, this puts extra strain on your heart, blood vessels, and organs.\n\n-Controlling BP is Important\nKeeping your blood pressure in a healthy range helps:\n-Protect your heart and brain\n-Lower your risk of heart disease, stroke, and kidney failure\n-Improve your overall energy and well-being\n-Prevent long-term damage to your body\n-Keep a BP log\n\nSelf management techniques:\n-Eat a heart-healthy diet like the DASH diet (low in salt and fat, high in fruits, vegetables, and whole grains)\n-active (at least 30 minutes of moderate exercise most days)\n-Maintain a healthy weight\n-Limit salt, alcohol, and caffeine\n-Avoid smoking\n-Take medications if prescribed\n-Check your BP regularly and follow up with your doctor\n\n\nReference:\n-Centers for Disease Control and Prevention (CDC)\nHigh Blood Pressure Facts\nhttps://www.cdc.gov/bloodpressure/facts.htm\n\n-American Heart Association (AHA)\nHealth Threats from High Blood Pressure\nhttps://www.heart.org/en/health-topics/high-blood-pressure/health-threats-from-high-blood-pressure", "diet": "Diet Tips for Heart Health: \n\n-Eat more fruits and vegetables every day, they help keep your \nheart strong.\n-Choose whole grains like brown rice, whole wheat bread, or \noatmeal instead of white bread or white rice.\n-Pick lean proteins such as chicken without skin, fish, beans, \nor tofu.\n-Limit salt by not adding extra at the table and avoiding processed or fast foods. Use herbs and spices for flavor instead.\n-Cut back on fatty foods like fried foods, butter, cheese, and fatty cuts of meat. Choose healthier fats like olive oil or avocado \nin small amounts.\n-Drink plenty of water and avoid sugary drinks.\n\n\nReference:\nAmerican Heart Association. (2023). Healthy eating for a healthy heart. https://www.heart.org/en/healthy-living/healthy-eating\n\nDASH diet:\n-Eat more of:\n-Fruits and vegetables\n-Whole grains (brown rice, oats, whole wheat bread)\n-Low-fat or fat-free dairy products\n-Lean meats, poultry, and fish\n-Nuts, seeds, and legumes (beans, lentils)\n-Limit or avoid:\n-Salt (sodium): aim for less than 2,300 mg/day or 1,500 mg if advised\n-Processed and packaged foods (chips, canned soup, deli meats)\n-Sugary drinks and sweets\n-Foods high in saturated fat (fried foods, fatty meats, full-fat dairy)\n-Alcohol (limit to 1 drink/day for women, 2 for men)\n-Read nutrition labels and choose \u201clow-sodium\u201d or \u201cno-salt-added\u201d products\n-Cook at home more often and avoid adding salt at the table\n-Use herbs, lemon, garlic, and spices for flavor instead of salt\n-Rinse canned vegetables and beans to remove extra sodium", "online": "", "community": ""}, "Hypothyroidism": {"education": "Hypothyroidism is when there isn't enough thyroid hormone in your bloodstream and your metabolism slows down. This condition can cause a low body temperature, anemia, confusion, heart failure, and more serious a coma. \nSymptoms usually develop slowly over time, they can include feeling tired, weight gain, feeling depressed, having higher than normal blood cholesterol levels, and feeling more forgetful. \nSeek medical advice if you experience confusion, hypothermia, and drowsiness.\nIn some rare cases low thyroid level can lead to a life threatening condition called myxedema coma, this is when emergency treatment is needed. \n\n-Your thyroid makes hormones that help control how fast your body works, like your heart rate and energy. When your thyroid is not working well like in hypothyroidism your body slows down.\nThis can also change how your body uses sugar and insulin. If your thyroid levels are low, it can make it harder to keep your blood sugar in a healthy range.\nSo if we manage your thyroid well, it will also help keep your diabetes under better control.\n\n-Your thyroid medicine works best if you take it the right way. Take it first thing in the morning, before you eat or drink anything besides water. Wait about 30 to 60 minutes before you eat breakfast or take any other pills.\nSome foods and vitamins, especially calcium and iron \u2014 can stop the medicine from working properly. So if you take vitamins or other meds with calcium or iron, wait at least 4 hours after your thyroid pill.\nThis helps your body absorb the medicine the right way, so you \nfeel better. \n\nhttps://my.clevelandclinic.org/\n\nUpToDate. (2023). Patient education: Hypothyroidism (The Basics). https://www.uptodate.com/contents/hypothyroidism-the-basics", "diet": "Getting enough iodine in the diet is essential for the thyroid to work as it should. In developed countries, thyroid disease that comes from not getting enough iodine has been nearly eliminated by adding iodine to salt and food. Eating a balanced diet makes taking extra iodine unnecessary.\n\nFoods to Eat\n-Fruits & Vegetables: Berries, apples, spinach, sweet potatoes, carrots, broccoli, peppers (rich in vitamins A, C, E, antioxidants). \n-Lean Proteins: Fish, eggs, chicken, turkey, beans, lentils (good sources of protein, zinc, selenium). \n-Whole Grains: Oats, quinoa, brown rice (fiber, nutrients). \n-Healthy Fats: Avocado, olive oil, nuts, seeds (omega-3s, vitamin E). \n-Dairy/Alternatives: Yogurt, unsweetened milk alternatives (check for sensitivities). \n-Iodine Sources (Use Moderately): Iodized salt, seaweed (nori, wakame). \n-Minerals: Brazil nuts (selenium), pumpkin seeds, oysters (zinc). \n\nFoods to avoid\n-Processed Foods & Sugar: High sodium, unhealthy fats, low nutrients. \n-Excess Iodine: Too much can worsen thyroid issues; get from food, not just supplements. \n-Soy: Can interfere with thyroid medication absorption; take meds hours apart. \n-Gluten: May benefit those with autoimmune thyroiditis (Hashimoto's) if sensitive. \n-Calcium/Iron Supplements: Take separately from thyroid meds. \n-Walnuts, High-Fiber Foods (with meds): Can hinder medication absorption; separate timing. \n\nReference:\n\n\nAmerican Thyroid Association (ATA).\n\nhttps://www.thyroid.org/hypothyroidism/ \n\nhttps://www.mayoclinic.org/diseases-conditions/hypothyroidism/expert-answers/hypothyroidism-diet/", "online": "American Thyroid Association\nhttps://www.thyroid.org/\n\nNIDDK\nhttps://www.niddk.nih.gov/health-information/endocrine-diseases/hypothyroidism", "community": ""}, "Laryngeal Cancer": {"education": "Laryngeal cancer is a type of cancer that starts in the larynx, also called the voice box. The larynx is located in your throat and helps you speak, breathe, and swallow.\n\nKey Facts:\nIt usually starts in the lining of the larynx, often caused by long-term smoking or alcohol use.\n\n-It is more common in men over 55 years old.\n-Human papillomavirus (HPV) infection can also increase the risk.\n\nSymptoms May Include:\n-Hoarseness or voice changes that don\u2019t go away\n-Sore throat or cough that doesn\u2019t improve\n-Difficulty swallowing\n-Lump in the neck\n-Ear pain\n-Trouble breathing (in later stages)\n\nDiagnosis:\n-Done through physical exam, laryngoscopy (camera to view the larynx), biopsy, and imaging tests like CT or MRI scans.\n\nTreatment Options:\n-Radiation therapy\n-Surgery (may include partial or total removal of the larynx)\n-Chemotherapy\n-Speech therapy after treatment, especially if voice is affected\n-Tracheostomy (breathing tube) if needed for airway support\n\n\nReference:\nAmerican Cancer Society. (2023). Laryngeal and hypopharyngeal cancer. https://www.cancer.org/cancer/laryngeal-and-hypopharyngeal-cancer.html", "diet": "Tracheostomy Care at Home:\n-Wash your hands before and after touching the trach.\n-Clean the skin around the trach site once or twice daily or as directed.\n-Use sterile gauze and saline to clean around the opening.\n-Change the inner cannula if it\u2019s disposable or clean it if reusable.\n-Replace trach ties when wet, soiled, or per provider \ninstructions.\n-Keep the area dry and free from mucus buildup.\n-Watch for signs of infection: redness, swelling, pus, or fever.\n\n\nSuctioning the Tracheostomy Tube:\n-Suction removes mucus to keep the airway clear.\n-Only suction when needed: coughing, noisy breathing, or visible mucus.", "online": "", "community": ""}, "NASH": {"education": "NASH is a liver condition caused by fat buildup and inflammation. Over time, it can lead to cirrhosis, or scarring of the liver.\n\nCauses & Risk Factors:\n-Obesity\n-Diabetes\n-High cholesterol or triglycerides\n-Insulin resistance\n\nPossible complications:\n-Ascites (fluid buildup in the belly)\n-Varices (swollen veins in the esophagus or stomach that can bleed-Hepatic encephalopathy (confusion due to toxins not filtered by the liver)\n-Easy bruising or bleeding\n\nDiet and Lifestyle for Liver Health\nFollow these key guidelines:\n-Low sodium (salt): Helps prevent fluid buildup (goal: <2,000 mg/day)\n-Moderate protein: Too much can worsen encephalopathy; aim for lean sources like poultry or tofu\n-Low-fat diet: Supports weight loss and liver function\n\nAvoid hepatotoxins:\n-Alcohol (must be completely avoided)\n-NSAIDs like ibuprofen or naproxen (can harm the liver and \nkidneys)\n\nReference:\nNational Institute of Diabetes and Digestive and Kidney Diseases (NIDDK). (2023). Nonalcoholic Fatty Liver Disease (NAFLD) & NASH.", "diet": "", "online": "", "community": ""}, "OSA": {"education": "Obstructive sleep apnea, also called OSA, happens when your upper airway becomes blocked many times while you sleep. The blockage can reduce or completely stop airflow. This is the most common type of sleep apnea. \n\nCauses:\n-Obesity, large tonsils, or changes in your hormone levels can narrow your airway. Any of these factors could increase your risk for obstructive sleep apnea.\n\nSelf-care plan information:\n\n-Adherence to plan is necessary to achieve goals and further complications could arise if not maintained.\n\n-Alcohol limitation\n\n-BPAP/CPAP treatment\n \n-Weight loss, if indicated\n\n-Sleep positioning (eg, avoid supine, side sleep)\n\n-Exercise program within provider's recommendations\n\n-Symptom management (eg, treat nasal congestion)\n\nhttps://www.nhlbi.nih.gov/health/sleep-apnea", "diet": "", "online": "", "community": ""}, "Osteoperosis": {"education": "Osteoporosis is a condition where your bones become thin, weak, and brittle, making them more likely to break. It often happens silently, meaning you may not feel any symptoms until a fracture occurs.\n\n-Causes:\n-Aging: As we get older, bones naturally lose density.\n-Menopause: Women lose bone more quickly after menopause due to lower estrogen levels.\n-Low Calcium & Vitamin D Intake: These are essential for strong bones.\n-Lack of Physical Activity: Especially weight-bearing exercises.\n-Family History: If osteoporosis runs in your family, your risk may be higher.\n-Certain Medications or Health Conditions: Long-term use of steroids or having conditions like rheumatoid arthritis can increase risk.\n\nHow to Protect Your Bones:\n-Eat a bone-healthy diet: Include foods rich in calcium and vitamin D (like dairy, leafy greens, fortified foods).\n-Take supplements if recommended by your doctor.\n-Stay active: Do weight-bearing exercises like walking, dancing, or light strength training.\n-Prevent falls: Use non-slip shoes, keep your home clutter-free, and install grab bars if needed.\n-Avoid smoking and limit alcohol: These can weaken bones over time.\n-Get bone density tests as recommended to monitor bone health.", "diet": "", "online": "", "community": ""}, "PAD": {"education": "", "diet": "", "online": "", "community": ""}, "Pain Management": {"education": "Pain self-care:\n-Medication information: name, purpose, dose, schedule, administration\n-Use of cognitive behavioral therapy\n-Importance of relaxation and stress management due to the toll pain takes on mental health\n-Positioning and safe movement\n-Maintenance of pain diary, including: pain trigger; pain intensity; self-care techniques to alleviate pain; effect of self-care techniques; medication, if used, including dose and frequency; and effect of medication", "diet": "", "online": "", "community": ""}, "PTSD": {"education": "", "diet": "", "online": "", "community": ""}, "Pulmonary Fibrosis": {"education": "Pulmonary fibrosis (PF) is a scarring and thickening in your lungs that makes it hard to breathe deeply. It\u2019s a type of interstitial lung disease, which affects the tissue between the air sacs in your lungs (alveoli).\nHard, stiff lung tissues don\u2019t expand as well as they should. If you have pulmonary fibrosis, you may get short of breath during daily tasks that never seemed tiring before. Pulmonary fibrosis is permanent and usually gets progressively worse over time (called progressive pulmonary fibrosis).\n\nPulmonary fibrosis symptoms include:\n-Shortness of breath, especially during or soon after exertion\n-Breathing in short, shallow spurts\n-Dry cough that doesn\u2019t go away\n-Fatigue\n-Unexplained weight loss\n-Clubbed fingers\n-Bluish, gray or white skin around your lips, eyes or nails (cyanosis)\n\nNo, there isn\u2019t a cure for pulmonary fibrosis. Treatment focuses on easing symptoms, slowing down progression, and improving your quality of life.\n\nTreatments for pulmonary fibrosis could include:\n\n-Antifibrotic medications. Nintedanib (OFEV\u00ae) or pirfenidone (Esbriet\u00ae) may slow down lung scarring and preserve lung function.\n-Corticosteroids. These are sometimes used to reduce inflammation.\n-Oxygen therapy. Your provider will prescribe extra oxygen if you don\u2019t have enough of it getting to your blood or tissues. It\u2019s delivered through a mask or tube in your nose.\n-Pulmonary rehabilitation. Breathing exercises and physical therapy can make your lungs stronger and breathing easier.\n-Lung transplant. Some people with fibrosis are eligible for a lung transplant.\n-Clinical trials. If you\u2019re interested, your provider can help you join a research study of new medicines that can potentially help people.\nYou may also need medications to treat underlying causes (like autoimmune disease) or conditions that make scarring worse (like GERD).\n\nhttps://my.clevelandclinic.org/health/diseases/10959-pulmonary-fibrosis", "diet": "", "online": "", "community": ""}, "PVD": {"education": "", "diet": "", "online": "", "community": ""}, "Skin Cancer": {"education": "Understand Common Types of Skin Cancer on the Nose/Face\n\nBasal Cell Carcinoma (BCC):\n-Most common type\n-Often appears as a pearly bump or a sore that won\u2019t heal\n-Grows slowly but can damage nearby tissues\n\nSquamous Cell Carcinoma (SCC):\n-May look like a red, scaly patch or crusted sore\n-Can spread if left untreated\n\nMelanoma:\n-Least common but most dangerous\n-Often starts in a mole or new dark spot that changes over time\n\nPerform Monthly Self-Skin Checks:\n-Use a mirror (or a hand mirror and wall mirror) to examine the nose, ears, and other hard-to-see facial areas.\nLook for:\n-New growths\n-Sores that won\u2019t heal\n-Changes in color, shape, or size of existing spots or moles\n\nTip: Take photos to track changes over time.\n\nLearn the ABCDEs of Melanoma\nLetter\tWhat to Look For:\nA \u2013 Asymmetry\tOne half doesn\u2019t match the other\nB \u2013 Border\tIrregular, jagged, or blurred edges\nC \u2013 Color\tMultiple colors or uneven distribution\nD \u2013 Diameter\tLarger than 6 mm (about the size of a pencil eraser)\nE \u2013 Evolving\tAny change in shape, color, size, or symptom (itching/bleeding)\n\nAdditional Tips:\n-Apply SPF 30 or higher to your face and nose daily\u2014even on cloudy days.\n-Wear a wide-brimmed hat and sunglasses for added protection.\n-Avoid tanning beds and peak sun hours (10 AM\u20134 PM).\n\nReferences:\n-Skin Cancer Foundation. (2023). Types of Skin Cancer.\nRetrieved from: https://www.skincancer.org/skin-cancer-information/\n\n-American Academy of Dermatology Association (AAD). (2024). Skin Cancer: Signs and Prevention.\nRetrieved from: https://www.aad.org/public/diseases/skin-cancer", "diet": "", "online": "", "community": ""}, "Urinary Incontinence": {"education": "Bladder Training Techniques:\n-Start by going to the bathroom on a schedule, such as every 2 hours\u2014even if you don\u2019t feel the urge.\n-Gradually increase the time between bathroom visits (e.g., every few days, add 15\u201330 minutes).\n-Use urge-suppression techniques when you feel the need to\n urinate:\n-Sit, stay calm, take deep breaths.\n-Do quick Kegel exercises \n-Distract yourself until the urge passes.\n\nPelvic Floor Exercises (Kegels):\n-Tighten the muscles you use to stop urinating (don\u2019t actually do this during urination\u2014just to identify the muscle).\n-Hold for 3\u20135 seconds, then relax for 5 seconds.\n-Do 10\u201315 repetitions, 3 times a day (morning, afternoon, and \nnight).\n-Breathe normally\u2014do not hold your breath.\n\nKnown Bladder Irritants, limit or Avoid:\n-Caffeine (coffee, tea, sodas)\n-Alcohol\n-Spicy foods\n-Citrus fruits and juices\n-Carbonated beverages\n-Artificial sweeteners (in sugar-free gum or diet drinks)\n\nDo Instead:\n-Drink plenty of plain water during the day.\n-Monitor your bladder symptoms\u2014keeping a diary can help identify personal triggers.\n\n\nReference:\n-National Institute of Diabetes and Digestive and Kidney Diseases (NIDDK)\nBladder Control Problems (Urinary Incontinence)\nhttps://www.niddk.nih.gov/health-information/urologic-diseases/bladder-control-problems", "diet": "", "online": "", "community": ""}, "Weight Management": {"education": "Self-care plan for weight loss;\n\nDiet considerations (eg, set daily calorie limit, use food diary)\nExercise program within provider's recommendations\nIdentify realistic goal for losing weight (eg, 1 pound (0.5 kg) in 1 week)\nWeight monitoring and management\nRisk factor management (eg, trigger avoidance)\nComorbid condition management\nTreatment options for weight loss\n\n-Regular physical activity can help boost your metabolism, manage weight, and improve your energy levels\u2014even with Hashimoto\u2019s disease or hypothyroidism.\n\nWhat You Can Do:\n-Try walking for 30 minutes a day, 5 days a week, or as much as you can tolerate.\n\n-Start slow and increase gradually if you feel tired easily.\n\n-Activities like walking, swimming, or light yoga can be gentle on your body and still effective.", "diet": "", "online": "", "community": ""}, "Cancer": {"education": "What is it?\n\u2022 Cancer is when cells grow out of control and do not act like normal cells.\n\u2022 It can develop in almost any part of the body.\n\u2022 Most cancer cells form a clump or tumor, but not all tumors are cancer.\n\u2022 Cancers are harmful because they get in the way of how the body normally\nworks.\n\u2013 Cancers like lymphoma or leukemia change the body's ability to make\nhealthy blood cells. The body needs healthy blood cells to work well.\n\u2013 Some cancers can go into other parts of the body and grow new tumors.\nThis is called metastasis.\nWhat causes it?\n\u2022 Sometimes the cause is not known.\n\u2022 Some things may increase the risk.\n\u2013 Alcohol misuse\n\u2013 Contact with chemicals\n\u2013 Contact with radiation\n\u2013 Family history (genetics)\n\u2013 Smoking\n\u2013 Too much time in the sun or tanning\n\u2013 Viruses", "diet": "", "online": "", "community": ""}, "Sick Sinus Syndrome": {"education": "", "diet": "", "online": "", "community": ""}};
